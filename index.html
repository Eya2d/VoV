    /* ─────────────────────────────────────────────
       دوال مساعدة لتحويل رابط iframe → embed
    ───────────────────────────────────────────── */
    function buildEmbedUrl(src) {
        if (!src) return src;

        // يوتيوب: youtu.be/<id> أو watch?v=<id> أو /embed/ (بدون تغيير)
        const ytWatch = src.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
        if (ytWatch) {
            const id = ytWatch[1];
            // نأخذ start إن وُجد
            const startMatch = src.match(/[?&](?:start|t)=(\d+)/);
            const start = startMatch ? `&start=${startMatch[1]}` : '';
            return `https://www.youtube.com/embed/${id}?autoplay=0&controls=0&modestbranding=1&rel=0&disablekb=1&iv_load_policy=3&fs=0&playsinline=1${start}`;
        }

        // يوتيوب embed موجود مسبقاً: نضيف/نعدّل المعاملات فقط
        if (/youtube\.com\/embed\//.test(src)) {
            const url = new URL(src);
            url.searchParams.set('controls', '0');
            url.searchParams.set('modestbranding', '1');
            url.searchParams.set('rel', '0');
            url.searchParams.set('disablekb', '1');
            url.searchParams.set('iv_load_policy', '3');
            url.searchParams.set('fs', '0');
            url.searchParams.set('playsinline', '1');
            return url.toString();
        }

        // Vimeo: vimeo.com/<id> أو /video/<id>
        const vimeo = src.match(/vimeo\.com\/(?:video\/)?(\d+)/);
        if (vimeo) {
            return `https://player.vimeo.com/video/${vimeo[1]}?controls=0&title=0&byline=0&portrait=0`;
        }

        // Vimeo player موجود
        if (/player\.vimeo\.com\/video\//.test(src)) {
            const url = new URL(src);
            url.searchParams.set('controls', '0');
            url.searchParams.set('title', '0');
            url.searchParams.set('byline', '0');
            url.searchParams.set('portrait', '0');
            return url.toString();
        }

        // روابط أخرى: نُعيد كما هي (المستخدم يضع رابط embed مباشر)
        return src;
    }

    let ytApiReady = false;

    function loadYouTubeAPI(cb) {
        if (ytApiReady) { cb(); return; }
        ytApiCallbacks.push(cb);
        if (ytApiLoading) return;
        ytApiLoading = true;
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function() {

        ytApiCallbacks.forEach(fn => fn());
        ytApiCallbacks.length = 0;

    function isMobileDevice() {

    function formatTime(s) {
        if (isNaN(s) || s < 0) return '0:00';
        s = Math.floor(s);
        const h   = Math.floor(s / 3600);
        const m   = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function getStorageKey(id, suffix) {
        const hash = btoa(encodeURIComponent(id)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 60);
        return `cvp_${suffix}_${hash}`;
    }

    window.customVideoPlayer = function(mediaElement) {
        if (!mediaElement) return;

        const isIframe = mediaElement.tagName === 'IFRAME';

        /* ── بناء الـ wrapper ── */
        const wrapper = document.createElement('div');

        const isYouTube = isIframe && /youtube\.com|youtu\.be/.test(mediaElement.src || mediaElement.getAttribute('src') || '');
        const isVimeo   = isIframe && /vimeo\.com/.test(mediaElement.src || mediaElement.getAttribute('src') || '');

        if (isIframe) {
            const rawSrc = mediaElement.getAttribute('src') || '';
            const embedSrc = buildEmbedUrl(rawSrc);

            iframeContainer = document.createElement('div');
            iframeContainer.className = 'cvp-iframe-container';

            // نستبدل الـ src بالـ embed مع controls=0
            mediaElement.setAttribute('src', embedSrc);
            mediaElement.setAttribute('allowfullscreen', '');
            mediaElement.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
            mediaElement.removeAttribute('controls');
            iframeContainer.appendChild(mediaElement);

            // overlay شفاف يمنع نقر المستخدم على أدوات iframe
            iframeOverlay = document.createElement('div');
            iframeOverlay.className = 'cvp-iframe-overlay';
            iframeContainer.appendChild(iframeOverlay);

        /* ── flash overlays ── */

                    <button class="veowc2s0d" title="Old TV quality"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" fill-rule="evenodd" d="M3 3.5h10A1.5 1.5 0 0 1 14.5 5v5a1.5 1.5 0 0 1-1.5 1.5H3A1.5 1.5 0 0 1 1.5 10V5A1.5 1.5 0 0 1 3 3.5m-.21 9.493A3 3 0 0 1 0 10V5a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v5a3 3 0 0 1-2.79 2.993l.46.922a.75.75 0 1 1-1.34.67L11.536 13H4.464l-.793 1.585a.75.75 0 1 1-1.342-.67z" clip-rule="evenodd"/></svg></button>
                    <button class="custom-fullscreen">${SVG_FULLSCREEN_ENTER}</button>

        wrapper.appendChild(controls);

        const progressTrack    = controls.querySelector('.progress-track');
        const progressFill     = controls.querySelector('.progress-fill');
        const progressBuffered = controls.querySelector('.progress-buffered');
        const progressThumb    = controls.querySelector('.progress-thumb');

        const volumeTrack      = controls.querySelector('.volume-track');

        const allButtons = isIframe

        function setControlsDisabled(disabled) {

        /* ══ منطق الفيديو العادي ══ */
        if (!isIframe) {

            }
            function restoreVolume() {
                try {
                    const saved = localStorage.getItem(getVolKey());
                    if (saved !== null) {
                        const vol = parseFloat(saved);
                        if (!isNaN(vol)) { if (vol === 0) { mediaElement.muted = true; mediaElement.volume = 0; } else { mediaElement.muted = false; mediaElement.volume = Math.min(1, Math.max(0, vol)); } setVolume(mediaElement.muted ? 0 : mediaElement.volume); return; }
                    }

            /* حفظ/استعادة الموضع */
            let isSaving = false, saveInterval = null, storageKey = null;

            }
            function restoreSavedPosition() {
                try {
                    const saved = localStorage.getItem(getPosKey());
                    if (saved !== null) {
                        const t = parseFloat(saved);

                    }

            function startSaving() { isSaving = true; updateSaveIcon(); saveCurrentPosition(); saveInterval = setInterval(saveCurrentPosition, 1000); }
            function stopSaving()  { isSaving = false; updateSaveIcon(); clearInterval(saveInterval); saveInterval = null; try { localStorage.removeItem(getPosKey()); } catch(e) {} }

            saveBtn.addEventListener('click', (e) => { e.stopPropagation(); if (isSaving) stopSaving(); else startSaving(); });
            mediaElement.addEventListener('seeked', () => saveCurrentPosition());
            mediaElement.addEventListener('timeupdate', () => { if (isSaving) saveCurrentPosition(); });
            mediaElement.addEventListener('loadedmetadata', () => {
                storageKey = getStorageKey(mediaElement.src || '', 'pos');
                restoreSavedPosition(); restoreVolume(); updateProgressBar(); updateTotalTimeDisplay();
            });

            allPlayers.push({ videoElement: mediaElement, wrapper, saveCurrentPosition, saveCurrentVolume });

            mediaElement.addEventListener('timeupdate', updateProgressBar);
            mediaElement.addEventListener('progress', updateBuffered);
            mediaElement.addEventListener('play',  () => { updatePlayButton(); updateControlsVisibility(); });
            mediaElement.addEventListener('pause', () => { updatePlayButton(); updateControlsVisibility(); });
            mediaElement.addEventListener('ended', () => { updatePlayButton(); updateControlsVisibility(); });
        }

        /* ══ منطق YouTube IFrame API ══ */
        if (isYouTube) {
            // نحتاج id من الـ iframe لتهيئة YT.Player
            const iframeEl = mediaElement;
            if (!iframeEl.id) iframeEl.id = 'cvp-yt-' + Math.random().toString(36).slice(2, 8);

            loadYouTubeAPI(() => {
                ytPlayer = new YT.Player(iframeEl.id, {
                    events: {
                        onReady: (event) => {
                            ytReady = true;
                            ytDuration = event.target.getDuration();
                            totalTimeDisplay.textContent = formatTime(ytDuration);
                            wrapper.classList.remove('loading');
                            setControlsDisabled(false);
                            updatePlayButton();
                            // تحديث شريط التقدم بشكل دوري
                            ytProgressInterval = setInterval(() => {
                                if (!ytPlayer || !ytReady) return;
                                ytCurrentTime = ytPlayer.getCurrentTime() || 0;
                                ytDuration    = ytPlayer.getDuration() || 0;
                                if (ytDuration > 0) {
                                    const pct = (ytCurrentTime / ytDuration) * 100;
                                    progressFill.style.width = pct + '%';
                                    progressThumb.style.left = pct + '%';
                                    const remaining = ytDuration - ytCurrentTime;
                                    timeDisplay.textContent = formatTime(remaining);
                                    totalTimeDisplay.textContent = formatTime(ytDuration);
                                }
                            }, 500);
                        },
                        onStateChange: (event) => {
                            const S = YT.PlayerState;
                            ytPaused = (event.data !== S.PLAYING);
                            updatePlayButton();
                            if (event.data === S.PLAYING) {
                                showCenterIcon(false);
                                updateControlsVisibility();
                            } else if (event.data === S.PAUSED || event.data === S.ENDED) {
                                showCenterIcon(true);
                                showControls(); clearTimeout(hideTimeout);
                            }
                        }
                    }
                });
            });
        }

        /* ══ منطق Vimeo Player API ══ */
        if (isVimeo) {
            const vimeoScript = document.createElement('script');
            vimeoScript.src = 'https://player.vimeo.com/api/player.js';
            vimeoScript.onload = () => {
                vimeoPlayer = new Vimeo.Player(mediaElement);
                vimeoPlayer.ready().then(() => {
                    wrapper.classList.remove('loading');
                    setControlsDisabled(false);
                    vimeoPlayer.getDuration().then(d => {
                        ytDuration = d;
                        totalTimeDisplay.textContent = formatTime(d);
                    });
                    setInterval(() => {
                        vimeoPlayer.getCurrentTime().then(t => {
                            ytCurrentTime = t;
                            if (ytDuration > 0) {
                                const pct = (t / ytDuration) * 100;
                                progressFill.style.width = pct + '%';
                                progressThumb.style.left = pct + '%';
                                timeDisplay.textContent = formatTime(ytDuration - t);
                            }
                        });
                    }, 500);
                });
                vimeoPlayer.on('play',  () => { ytPaused = false; updatePlayButton(); showCenterIcon(false); updateControlsVisibility(); });
                vimeoPlayer.on('pause', () => { ytPaused = true;  updatePlayButton(); showCenterIcon(true);  showControls(); clearTimeout(hideTimeout); });
                vimeoPlayer.on('ended', () => { ytPaused = true;  updatePlayButton(); showControls(); clearTimeout(hideTimeout); });
            };
            if (!document.querySelector('script[src*="vimeo.com/api/player"]')) {
                document.head.appendChild(vimeoScript);
            } else {
                vimeoScript.onload();
            }
        }

        /* iframe بدون API (روابط أخرى): نفتح أدوات الـ overlay فقط */
        if (isIframe && !isYouTube && !isVimeo) {
            wrapper.classList.remove('loading');
            setControlsDisabled(false);

        /* ══ دوال مشتركة (video + iframe) ══ */

        function isPlayerPaused() {
            if (!isIframe) return mediaElement.paused;

        function playerPlay() {
            if (!isIframe) { mediaElement.play(); return; }
            if (ytPlayer  && ytReady)    { ytPlayer.playVideo(); return; }
            if (vimeoPlayer)             { vimeoPlayer.play();   return; }
        }
        function playerPause() {
            if (!isIframe) { mediaElement.pause(); return; }
            if (ytPlayer  && ytReady)    { ytPlayer.pauseVideo(); return; }
            if (vimeoPlayer)             { vimeoPlayer.pause();   return; }
        }
        function playerSeekTo(t) {
            if (!isIframe) { mediaElement.currentTime = t; return; }
            if (ytPlayer  && ytReady)    { ytPlayer.seekTo(t, true); ytCurrentTime = t; return; }
            if (vimeoPlayer)             { vimeoPlayer.setCurrentTime(t); ytCurrentTime = t; return; }
        }
        function playerDuration() {
            if (!isIframe) return mediaElement.duration || 0;
            return ytDuration || 0;

        function playerCurrentTime() {
            if (!isIframe) return mediaElement.currentTime || 0;
            return ytCurrentTime || 0;

        /* ══ إدارة ظهور عناصر التحكم ══ */
        let hideTimeout = null;

        function showControls() {
            wrapper.classList.add('controls-visible');

        function scheduleHide() {
            clearTimeout(hideTimeout);

                if (!isPlayerPaused() && !isDragging) {
                    wrapper.classList.remove('controls-visible');

        function updateControlsVisibility() {

        wrapper.addEventListener('mousemove', () => {
            showControls();
            if (!isPlayerPaused()) scheduleHide();
        });
        wrapper.addEventListener('mouseleave', () => {
            if (isDragging) return;

                clearTimeout(hideTimeout);
                wrapper.classList.remove('controls-visible');

                if (isMobileDevice()) mobileControlsVisible = false;

        });

        function updateTimeDisplay() {
            const remaining = playerDuration() - playerCurrentTime();
            timeDisplay.textContent = formatTime(remaining);
        }
        function updateProgressBar() {
            if (!mediaElement.duration) return;
            const pct = (mediaElement.currentTime / mediaElement.duration) * 100;
            progressFill.style.width  = pct + '%';
            progressThumb.style.left  = pct + '%';

        }
        function updateBuffered() {
            if (!mediaElement.duration || !mediaElement.buffered.length) return;
            const pct = (mediaElement.buffered.end(mediaElement.buffered.length - 1) / mediaElement.duration) * 100;
            progressBuffered.style.width = pct + '%';
        }

        function getPctFromEvent(e, trackEl) {
            const rect = trackEl.getBoundingClientRect();
            return Math.max(0, Math.min((e.clientX - rect.left) / rect.width, 1));
        }
        function getPctFromTouch(touch, trackEl) {
            const rect = trackEl.getBoundingClientRect();
            return Math.max(0, Math.min((touch.clientX - rect.left) / rect.width, 1));
        }
        function applySeekPct(pct) {
            const dur = playerDuration();
            if (!dur) return;
            const newTime = pct * dur;
            playerSeekTo(newTime);
            progressFill.style.width = (pct * 100) + '%';
            progressThumb.style.left = (pct * 100) + '%';
            timeDisplay.textContent  = formatTime(dur - newTime);
        }
        function updateTooltip(clientX) {
            const dur = playerDuration();
            if (!dur) return;

            progressTooltip.style.left  = x + 'px';

        /* شريط التقدم - ماوس */

        function volFromClientX(clientX) {
            if (isIframe) return; // الصوت غير متاح للـ iframe

        function updatePlayButton() { playBtn.innerHTML = isPlayerPaused() ? SVG_PLAY : SVG_PAUSE; }

        /* ══ seek بالتراكم ══ */
        let seekAccumLeft = 0, seekAccumRight = 0, seekResetTimerLeft = null, seekResetTimerRight = null;
        const SEEK_RESET_DELAY = 1000;

        function showFlash(side, seconds) {

            el.querySelector('span').textContent = (side === 'left' ? '-' : '+') + seconds + 's';
            el.classList.add('show');
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(() => el.classList.remove('show'), 800);
        }
        function seekBy(seconds) {
            const side = seconds < 0 ? 'left' : 'right';
            const abs  = Math.abs(seconds);
            const cur  = playerCurrentTime();
            const dur  = playerDuration();
            if (side === 'left') {
                clearTimeout(seekResetTimerLeft); seekAccumLeft += abs;
                playerSeekTo(Math.max(0, cur - abs));
                showFlash('left', seekAccumLeft);
                seekResetTimerLeft = setTimeout(() => { seekAccumLeft = 0; }, SEEK_RESET_DELAY);
            } else {
                clearTimeout(seekResetTimerRight); seekAccumRight += abs;
                playerSeekTo(Math.min(dur || 0, cur + abs));
                showFlash('right', seekAccumRight);
                seekResetTimerRight = setTimeout(() => { seekAccumRight = 0; }, SEEK_RESET_DELAY);
            }
            if (!isIframe) updateProgressBar();
        }

        /* ══ منطق اللمس ══ */
        const SCROLL_THRESHOLD = 10, TAP_MOVE_LIMIT = 8, TAP_DELAY = 300;
        let touchStartX = 0, touchStartY = 0, touchMoved = false, touchIsScrolling = false;
        let tapCount = 0, tapTimer = null, tapSide = null;

        wrapper.addEventListener('touchstart', (e) => {
            const t = e.target;
            if (t.closest('.custom-controls') || t.closest('.cvp-settings-corner') || t.closest('.seek-flash') || t.closest('.cvp-iframe-overlay') === null && isIframe) {
                if (t.closest('.custom-controls') || t.closest('.cvp-settings-corner') || t.closest('.seek-flash')) return;
            }
            const touch = e.touches[0];
            touchStartX = touch.clientX; touchStartY = touch.clientY;
            touchMoved = false; touchIsScrolling = false;
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            const t = e.target;
            if (t.closest('.custom-controls') || t.closest('.cvp-settings-corner')) return;
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX, dy = touch.clientY - touchStartY;
            if (!touchMoved && (Math.abs(dx) > TAP_MOVE_LIMIT || Math.abs(dy) > TAP_MOVE_LIMIT)) touchMoved = true;
            if (!touchIsScrolling && Math.abs(dy) > SCROLL_THRESHOLD && Math.abs(dy) > Math.abs(dx)) touchIsScrolling = true;
            if (!touchIsScrolling) e.preventDefault();
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            const t = e.target;
            if (t.closest('.custom-controls') || t.closest('.cvp-settings-corner') || t.closest('.seek-flash')) return;
            if (touchIsScrolling || touchMoved) { touchIsScrolling = false; touchMoved = false; return; }
            e.preventDefault();
            if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); touchMoved = false; touchIsScrolling = false; return; }
            if (menuJustClosed) { touchMoved = false; touchIsScrolling = false; return; }
            if (!mobileControlsVisible) { showControls(); scheduleHide(); touchMoved = false; touchIsScrolling = false; return; }
            const touch  = e.changedTouches[0];
            const rect   = wrapper.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const side   = touchX < rect.width / 2 ? 'left' : 'right';
            if (tapCount === 1 && tapSide === side) {
                clearTimeout(tapTimer); tapCount = 0; tapSide = null;
                seekBy(side === 'right' ? 5 : -5);
                showControls(); if (!isPlayerPaused()) scheduleHide();
            } else {
                tapCount = 1; tapSide = side; clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    if (tapCount === 1) { playPause(); showControls(); updateControlsVisibility(); }
                    tapCount = 0; tapSide = null;
                }, TAP_DELAY);
            }
            touchMoved = false; touchIsScrolling = false;
        }, { passive: false });

        wrapper.addEventListener('touchcancel', () => { touchMoved = false; touchIsScrolling = false; }, { passive: true });

        /* ══ لوحة المفاتيح ══ */
        wrapper.setAttribute('tabindex', '0');
        wrapper.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ': case 'k': e.preventDefault(); if (!isIframe && activeMenuEl) { closeAll(); break; } playPause(); break;
                case 'ArrowRight': e.preventDefault(); seekBy(5); break;
                case 'ArrowLeft':  e.preventDefault(); seekBy(-5); break;
                case 'ArrowUp':    e.preventDefault(); if (!isIframe) setVolume(mediaElement.volume + 0.1); break;
                case 'ArrowDown':  e.preventDefault(); if (!isIframe) setVolume(mediaElement.volume - 0.1); break;
                case 'f': e.preventDefault(); toggleFullscreen(); break;
                case 'm': e.preventDefault(); if (!isIframe) toggleMute(); break;
                case 'Escape': if (!isIframe && activeMenuEl) { e.preventDefault(); closeAll(); } break;
            }
        });

        /* ══ فول-سكرين ══ */
        function updateFullscreenButton() { fullscreenBtn.innerHTML = document.fullscreenElement ? SVG_FULLSCREEN_EXIT : SVG_FULLSCREEN_ENTER; }
        function toggleFullscreen() {
            if (!document.fullscreenElement) wrapper.requestFullscreen().catch(err => console.log(err.message));
            else document.exitFullscreen();
        }
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement === wrapper) document.body.classList.add('dideofullscreen');
            else if (!document.fullscreenElement) document.body.classList.remove('dideofullscreen');
            updateFullscreenButton();
            /* عند الدخول للفول-سكرين في iframe: نجعل الـ overlay لا يعوق الفيديو */
            if (isIframe && iframeOverlay) {
                iframeOverlay.style.pointerEvents = document.fullscreenElement === wrapper ? 'none' : 'auto';
            }
        });

        /* ══ scanline & scan ══ */
        if (!isIframe) {
            toggleScanBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (scanlineDiv.style.display === 'block') { scanlineDiv.style.display = 'none'; toggleScanBtn.classList.remove('active'); }
                else { scanlineDiv.style.display = 'block'; toggleScanBtn.classList.add('active'); }
            });
            scanlineDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); return; }
                if (menuJustClosed) return;
                playPause();
            });
            mediaElement.addEventListener('click', (e) => {
                if (!isMobileDevice()) {
                    e.stopPropagation();
                    if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); return; }
                    if (menuJustClosed) return;
                    playPause();
                }
            });
        }

        /* ══ الأزرار ══ */
        playBtn.addEventListener('click', (e) => { e.stopPropagation(); playPause(); });
        if (!isIframe) restartBtn.addEventListener('click', (e) => { e.stopPropagation(); restartVideo(); });
        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });

        /* ══ نقر على الـ overlay للـ iframe ══ */
        if (isIframe && iframeOverlay) {
            iframeOverlay.addEventListener('click', (e) => {
                e.stopPropagation();
                if (menuJustClosed) return;
                if (!isMobileDevice()) playPause();
            });
        }

        showControls(); updatePlayButton(); updateTimeDisplay();
        if (!isIframe) { const si = controls.querySelector('.Video-save'); if (si) si.innerHTML = SVG_SAVE_INACTIVE; }

        return wrapper;
    };

    /* ══ تطبيق على جميع الفيديوهات والـ iframes ══ */
    window.applyToAllVideos = function() {
        // فيديوهات عادية
        document.querySelectorAll('video:not([data-customized])').forEach(video => {
            customVideoPlayer(video);
            video.setAttribute('data-customized', 'true');
        });
        // iframes (يوتيوب، فيميو، وغيرها)
        document.querySelectorAll('iframe:not([data-customized])').forEach(iframe => {
            const src = iframe.getAttribute('src') || '';
            // نتحقق أنه رابط فيديو معروف أو يحتوي على كلمة embed/video
            if (/youtube\.com|youtu\.be|vimeo\.com|embed|player/i.test(src)) {
                customVideoPlayer(iframe);
                iframe.setAttribute('data-customized', 'true');
            }
        });
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyToAllVideos);
    } else {
        applyToAllVideos();
    }

    const observer = new MutationObserver(mutations => {
        mutations.forEach(m => { if (m.addedNodes.length) applyToAllVideos(); });
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
    </script>
</body>
