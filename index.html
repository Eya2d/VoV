    /* ============================================================
       دالة مساعدة: هل الـ src من يوتيوب أو Vimeo أو غيره؟
    ============================================================ */
    function buildIframeSrc(originalSrc) {
        if (!originalSrc) return originalSrc;

        // يوتيوب: youtube.com/watch?v=ID  أو  youtu.be/ID
        const ytMatch = originalSrc.match(
            /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
        );
        if (ytMatch) {
            const videoId = ytMatch[1];
            // نضيف: controls=0  enablejsapi=1  rel=0  modestbranding=1  disablekb=1
            return `https://www.youtube.com/embed/${videoId}?controls=0&enablejsapi=1&rel=0&modestbranding=1&disablekb=1&iv_load_policy=3&fs=0&playsinline=1&showinfo=0&autohide=1&color=white&cc_load_policy=0`;
        }

        // Vimeo: vimeo.com/ID
        const vimeoMatch = originalSrc.match(/vimeo\.com\/(?:video\/)?(\d+)/);
        if (vimeoMatch) {
            const videoId = vimeoMatch[1];
            return `https://player.vimeo.com/video/${videoId}?controls=0&title=0&byline=0&portrait=0&loop=0`;
        }

        // غيرها: أضف ?controls=0 إن لم تكن موجودة
        if (!/controls=0/.test(originalSrc)) {
            const sep = originalSrc.includes('?') ? '&' : '?';
            return originalSrc + sep + 'controls=0';
        }
        return originalSrc;
    }

    function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
            || (navigator.maxTouchPoints > 1);
    }

    function formatTime(s) {
        if (isNaN(s) || s < 0) return '0:00';
        s = Math.floor(s);
        const h   = Math.floor(s / 3600);
        const m   = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function getStorageKey(id, suffix = 'pos') {
        const hash = btoa(encodeURIComponent(id)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 60);
        return `cvp_${suffix}_${hash}`;
    }

    const allPlayers = [];

    window.addEventListener('beforeunload', () => {

    /* ============================================================
       معالج مشغّل الـ iframe (يوتيوب وغيره)
       يتحكم عبر postMessage API (YouTube IFrame API)
    ============================================================ */
    window.customIframePlayer = function(iframeElement) {
        if (!iframeElement) return;

        const originalSrc = iframeElement.src || iframeElement.getAttribute('src') || '';
        const newSrc = buildIframeSrc(originalSrc);

        /* ====================================================
           بناء الـ wrapper
        ==================================================== */
        const wrapper = document.createElement('div');
        wrapper.className = 'custom-video-wrapper';
        iframeElement.parentNode.insertBefore(wrapper, iframeElement);

        /* حاوية الـ iframe مع تكبيره لإخفاء أدوات التشغيل */
        const iframeContainer = document.createElement('div');
        iframeContainer.className = 'cvp-iframe-container';

        /* تحديث الـ src بالمعاملات الصحيحة */
        iframeElement.src = newSrc;
        iframeElement.setAttribute('allowfullscreen', '');
        iframeElement.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
        iframeElement.frameBorder = '0';

        iframeContainer.appendChild(iframeElement);
        wrapper.appendChild(iframeContainer);

        /* طبقة شفافة تمنع المستخدم من التفاعل مع داخل الـ iframe */
        const blocker = document.createElement('div');
        blocker.className = 'cvp-iframe-blocker';
        wrapper.appendChild(blocker);

        /* flash overlays */
        const flashLeft  = document.createElement('div');
        flashLeft.className  = 'seek-flash left';
        flashLeft.innerHTML  = SVG_SEEK_BACK + '<span>-5s</span>';
        const flashRight = document.createElement('div');
        flashRight.className = 'seek-flash right';
        flashRight.innerHTML = SVG_SEEK_FWD + '<span>+5s</span>';
        wrapper.appendChild(flashLeft);
        wrapper.appendChild(flashRight);

        /* أيقونة تشغيل/إيقاف في المنتصف */
        const centerIcon = document.createElement('div');
        centerIcon.className = 'center-play-icon';
        centerIcon.innerHTML = SVG_PLAY;
        wrapper.appendChild(centerIcon);

        let centerIconTimer = null;
        function showCenterIcon(isPlay) {
            centerIcon.innerHTML = isPlay ? SVG_PLAY : SVG_PAUSE;
            clearTimeout(centerIconTimer);
            centerIcon.classList.remove('animate-out');
            void centerIcon.offsetWidth;
            centerIcon.classList.add('animate-in');
            centerIconTimer = setTimeout(() => {
                centerIcon.classList.remove('animate-in');
                centerIcon.classList.add('animate-out');
            }, 600);
        }

        /* ====================================================
           التواصل مع الـ iframe عبر postMessage
           يدعم: YouTube IFrame API
        ==================================================== */
        let ytPlayerReady = false;
        let ytPaused      = true;
        let ytDuration    = 0;
        let ytCurrentTime = 0;
        let ytVolume      = 100; // 0-100 في YouTube API
        let ytMuted       = false;

        /* نستمع لرسائل YouTube */
        function onYTMessage(event) {
            if (!event.data) return;
            let data;
            try {
                data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            } catch (e) { return; }

            if (!data || !data.event) return;

            if (data.event === 'ready') {
                ytPlayerReady = true;
                wrapper.classList.remove('loading');
                setControlsDisabled(false);
                /* اطلب معلومات المدة */
                ytPostMessage('addEventListener', 'onStateChange');
                ytPostMessage('addEventListener', 'onReady');
                ytPostMessage('getDuration');
                // استعادة الموضع المحفوظ بعد الجاهزية
                restoreSavedPosition();
            }
            if (data.event === 'infoDelivery' && data.info) {
                if (data.info.duration !== undefined) {
                    ytDuration = data.info.duration;
                    updateTotalTimeDisplay();
                }
                if (data.info.currentTime !== undefined) {
                    ytCurrentTime = data.info.currentTime;
                    updateProgressBar();
                    updateTimeDisplay();
                    if (isSaving) saveCurrentPosition();
                }
                if (data.info.volume !== undefined) {
                    ytVolume = data.info.volume;
                    updateVolumeUI(ytVolume / 100);
                }
                if (data.info.muted !== undefined) {
                    ytMuted = data.info.muted;
                    updateVolumeUI(ytMuted ? 0 : ytVolume / 100);
                }
                if (data.info.playbackRate !== undefined) {
                    currentSpeed = data.info.playbackRate;
                    updateSpeedLabelInMenu();
                }
            }
            if (data.event === 'onStateChange') {
                /* -1=unstarted, 0=ended, 1=playing, 2=paused, 3=buffering, 5=video cued */
                const state = data.info;
                if (state === 1) { // playing
                    ytPaused = false;
                    updatePlayButton();
                    scheduleHide();
                } else if (state === 2 || state === 0) { // paused or ended
                    ytPaused = true;
                    updatePlayButton();
                    showControls();
                    clearTimeout(hideTimeout);
                } else if (state === 3) { // buffering
                    ytPostMessage('getCurrentTime');
                }
            }
            if (data.event === 'onReady') {
                ytPlayerReady = true;
                wrapper.classList.remove('loading');
                setControlsDisabled(false);
                ytPostMessage('getDuration');
                ytPostMessage('getVolume');
                ytPostMessage('isMuted');
                ytPostMessage('getPlaybackRate');
                restoreSavedPosition();
            }
        }
        window.addEventListener('message', onYTMessage);

        function ytPostMessage(func, value) {
            try {
                const msg = { event: 'command', func: func };
                if (value !== undefined) msg.args = Array.isArray(value) ? value : [value];
                iframeElement.contentWindow.postMessage(JSON.stringify(msg), '*');
            } catch (e) {}
        }

        /* تحديث الوقت بشكل دوري (fallback لأن YouTube لا يرسل timeupdate) */
        let pollInterval = null;
        function startPolling() {
            if (pollInterval) return;
            pollInterval = setInterval(() => {
                ytPostMessage('getCurrentTime');
                ytPostMessage('getDuration');
                if (isSaving && ytCurrentTime > 0) saveCurrentPosition();
            }, 500);
        }
        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        /* ابدأ الـ polling فور تحميل الـ iframe */
        iframeElement.addEventListener('load', () => {
            startPolling();
            wrapper.classList.remove('loading');
            setControlsDisabled(false);
        });

        /* مهلة لتفعيل الأزرار في حال عدم وصول رسالة ready */
        let readyTimeout = setTimeout(() => {
            if (!ytPlayerReady) {
                ytPlayerReady = true;
                wrapper.classList.remove('loading');
                setControlsDisabled(false);
                ytPostMessage('getDuration');
                ytPostMessage('getCurrentTime');
                restoreSavedPosition();
            }
        }, 3000);

        /* ====================================================
           زر الإعدادات
        ==================================================== */
        const settingsCorner = document.createElement('div');
        settingsCorner.className = 'cvp-settings-corner';
        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'cvp-settings-btn';
        settingsBtn.title = 'الإعدادات';
        settingsBtn.innerHTML = SVG_SETTINGS;
        settingsCorner.appendChild(settingsBtn);
        wrapper.appendChild(settingsCorner);

        let currentSpeed  = DEFAULT_SPEED;
        let activeMenuEl  = null;
        let backdropEl    = null;
        let isAnimating   = false;
        let menuJustClosed = false;
        let isDragging    = false;

        function getSpeedLabel(s) { return s === 1 ? 'عادي' : s + 'x'; }
        function updateSpeedLabelInMenu() {
            if (!activeMenuEl) return;
            const labelSpan = activeMenuEl.querySelector('.cvp-current-speed-label');
            if (labelSpan) labelSpan.textContent = getSpeedLabel(currentSpeed);
        }

        function buildSettingsMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-settings-menu';
            menu.innerHTML = `
                <button class="cvp-settings-menu-item cvp-speed-trigger">
                    ${SVG_SPEED}
                    <span>سرعة التشغيل</span>
                    <span class="cvp-menu-item-right">
                        <span class="cvp-current-speed-label">${getSpeedLabel(currentSpeed)}</span>
                        ${SVG_ARROW_RIGHT}
                    </span>
                </button>
            `;
            menu.querySelector('.cvp-speed-trigger').addEventListener('click', (e) => {
                e.stopPropagation(); swapMenu('speed');
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function buildSpeedMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-speed-menu';
            let html = `
                <div class="cvp-speed-menu-header">
                    <button class="cvp-speed-back-btn" title="رجوع">${SVG_ARROW_LEFT}</button>
                    <span class="cvp-speed-menu-title">سرعة التشغيل</span>
                </div>
            `;
            SPEED_OPTIONS.forEach(speed => {
                const label = speed === 1 ? 'عادي (1x)' : speed + 'x';
                const activeClass = Math.abs(speed - currentSpeed) < 0.01 ? 'active' : '';
                html += `
                    <button class="cvp-speed-option ${activeClass}" data-speed="${speed}">
                        <span>${label}</span>
                        <span class="cvp-speed-check">${SVG_CHECK}</span>
                    </button>
                `;
            });
            menu.innerHTML = html;
            menu.querySelector('.cvp-speed-back-btn').addEventListener('click', (e) => {
                e.stopPropagation(); swapMenu('settings');
            });
            menu.querySelectorAll('.cvp-speed-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const speed = parseFloat(opt.dataset.speed);
                    currentSpeed = speed;
                    ytPostMessage('setPlaybackRate', speed);
                    // طلب تأكيد السرعة الفعلية
                    setTimeout(() => ytPostMessage('getPlaybackRate'), 200);
                    closeAll();
                });
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function createBackdrop() {
            const bd = document.createElement('div');
            bd.className = 'cvp-backdrop';
            bd.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                menuJustClosed = true;
                closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
            });
            bd.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                menuJustClosed = true;
                closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
            }, { passive: true });
            return bd;
        }

        function mountMenu(menuEl) {
            if (!backdropEl) {
                backdropEl = createBackdrop();
                wrapper.insertBefore(backdropEl, settingsCorner);
            }
            settingsCorner.appendChild(menuEl);
            activeMenuEl = menuEl;
            settingsBtn.classList.add('open');
            wrapper.classList.add('settings-open');
        }

        function unmountCurrent(callback) {
            if (!activeMenuEl) { if (callback) callback(); return; }
            const el = activeMenuEl;
            activeMenuEl = null;
            el.classList.add('hiding');
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
                if (callback) callback();
            }, ANIM_DURATION);
        }

        function unmountBackdrop() {
            if (!backdropEl) return;
            const bd = backdropEl;
            backdropEl = null;
            bd.classList.add('hiding');
            setTimeout(() => { if (bd.parentNode) bd.parentNode.removeChild(bd); }, ANIM_DURATION);
        }

        function openSettings() {
            if (isAnimating) return;
            isAnimating = true;
            mountMenu(buildSettingsMenu());
            setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
        }

        function swapMenu(target) {
            if (isAnimating) return;
            isAnimating = true;
            unmountCurrent(() => {
                const menu = target === 'speed' ? buildSpeedMenu() : buildSettingsMenu();
                settingsCorner.appendChild(menu);
                activeMenuEl = menu;
                setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
            });
        }

        function closeAll() {
            settingsBtn.classList.remove('open');
            unmountCurrent();
            unmountBackdrop();
            wrapper.classList.remove('settings-open');
        }

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeMenuEl) closeAll(); else openSettings();
        });

        document.addEventListener('mousedown', (e) => {
            if (activeMenuEl && !wrapper.contains(e.target)) {
                menuJustClosed = true;
                closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
            }
        });

        /* ====================================================
           شريط التحكم
        ==================================================== */
        const controls = document.createElement('div');
        controls.className = 'custom-controls';
        controls.innerHTML = `
            <div class="custom-progress" tabindex="0">
                <div class="progress-track">
                    <div class="progress-buffered"></div>
                    <div class="progress-fill"></div>
                    <div class="progress-thumb"></div>
                    <div class="progress-tooltip">0:00</div>
                </div>
            </div>
            <div class="ccvvvvf00f">
                <div class="kky66657e0">
                    <div class="custom-buttons">
                        <button class="custom-play">${SVG_PLAY}</button>
                        <button class="custom-restart" title="Restart">${SVG_RESTART}</button>
                    </div>
                    <div class="custom-volume" tabindex="0">
                        <span class="volume-icon">${SVG_VOL_ON}</span>
                        <div class="volume-track-wrap">
                            <div class="volume-track">
                                <div class="volume-fill"></div>
                                <div class="volume-thumb"></div>
                            </div>
                        </div>
                    </div>
                    <div class="time1">00:00</div><xxsde></xxsde>
                    <div class="time">00:00</div>
                </div>
                <div class="coooomf">
                    <button class="Video-save" title="حفظ موضع التشغيل">${SVG_SAVE_INACTIVE}</button>
                    <button class="custom-fullscreen">${SVG_FULLSCREEN_ENTER}</button>
                </div>
            </div>
        `;
        wrapper.appendChild(controls);

        const progressTrack    = controls.querySelector('.progress-track');
        const progressFill     = controls.querySelector('.progress-fill');
        const progressBuffered = controls.querySelector('.progress-buffered');
        const progressThumb    = controls.querySelector('.progress-thumb');
        const progressTooltip  = controls.querySelector('.progress-tooltip');
        const volumeTrack      = controls.querySelector('.volume-track');
        const volumeFill       = controls.querySelector('.volume-fill');
        const volumeWrap       = controls.querySelector('.custom-volume');
        const playBtn          = controls.querySelector('.custom-play');
        const restartBtn       = controls.querySelector('.custom-restart');
        const fullscreenBtn    = controls.querySelector('.custom-fullscreen');
        const volumeIcon       = controls.querySelector('.volume-icon');
        const timeDisplay      = controls.querySelector('.time');
        const totalTimeDisplay = controls.querySelector('.time1');
        const saveBtn          = controls.querySelector('.Video-save');

        const allButtons = [playBtn, restartBtn, fullscreenBtn, saveBtn, volumeIcon];

        function setControlsDisabled(disabled) {
            allButtons.forEach(btn => {
                if (disabled) { btn.setAttribute('disabled', ''); btn.classList.add('disabled'); }
                else           { btn.removeAttribute('disabled'); btn.classList.remove('disabled'); }
            });
            volumeTrack.style.pointerEvents = disabled ? 'none' : 'auto';
            volumeTrack.style.opacity       = disabled ? '0.5'  : '1';
        }
        setControlsDisabled(true);

        /* ── الوقت / شريط التقدم ── */
        function updateTotalTimeDisplay() {
            totalTimeDisplay.textContent = ytDuration > 0 ? formatTime(ytDuration) : '0:00';
        }
        function updateTimeDisplay() {
            const remaining = (ytDuration || 0) - (ytCurrentTime || 0);
            timeDisplay.textContent = formatTime(remaining);
        }
        function updateProgressBar() {
            if (!ytDuration) return;
            const pct = (ytCurrentTime / ytDuration) * 100;
            progressFill.style.width = pct + '%';
            progressThumb.style.left = pct + '%';
            updateTimeDisplay();
        }
        function updateTooltip(clientX) {
            if (!ytDuration) return;
            const rect = progressTrack.getBoundingClientRect();
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            progressTooltip.textContent = formatTime((x / rect.width) * ytDuration);
            progressTooltip.style.left  = x + 'px';
        }
        function applySeekPct(pct) {
            if (!ytDuration) return;
            const newTime = pct * ytDuration;
            ytCurrentTime = newTime;
            ytPostMessage('seekTo', [newTime, true]);
            progressFill.style.width = (pct * 100) + '%';
            progressThumb.style.left = (pct * 100) + '%';
            timeDisplay.textContent  = formatTime(ytDuration - newTime);
            if (isSaving) saveCurrentPosition();
        }
        function getPctFromEvent(e, el) {
            const rect = el.getBoundingClientRect();
            return Math.max(0, Math.min((e.clientX - rect.left) / rect.width, 1));
        }
        function getPctFromTouch(touch, el) {
            const rect = el.getBoundingClientRect();
            return Math.max(0, Math.min((touch.clientX - rect.left) / rect.width, 1));
        }

        /* ── شريط تقدم: ماوس ── */
        let seekingProgress = false;
        progressTrack.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            seekingProgress = true; isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            progressTrack.classList.add('dragging');
            applySeekPct(getPctFromEvent(e, progressTrack));
        });
        document.addEventListener('mousemove', (e) => {
            if (seekingProgress) { applySeekPct(getPctFromEvent(e, progressTrack)); updateTooltip(e.clientX); }
            else if (seekingVolume) { volFromClientX(e.clientX); }
        });
        document.addEventListener('mouseup', () => {
            if (seekingProgress) {
                seekingProgress = false; isDragging = false;
                progressTrack.classList.remove('dragging');
                if (!ytPaused) scheduleHide();
            }
            if (seekingVolume) {
                seekingVolume = false; isDragging = false;
                if (!ytPaused) scheduleHide();
            }
        });
        progressTrack.addEventListener('mousemove', (e) => updateTooltip(e.clientX));

        /* ── شريط تقدم: لمس ── */
        let touchSeekingProgress = false;
        progressTrack.addEventListener('touchstart', (e) => {
            e.stopPropagation(); e.preventDefault();
            touchSeekingProgress = true; isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            progressTrack.classList.add('dragging');
            const t = e.touches[0];
            applySeekPct(getPctFromTouch(t, progressTrack));
            updateTooltip(t.clientX);
        }, { passive: false });
        progressTrack.addEventListener('touchmove', (e) => {
            if (!touchSeekingProgress) return;
            e.stopPropagation(); e.preventDefault();
            const t = e.touches[0];
            applySeekPct(getPctFromTouch(t, progressTrack));
            updateTooltip(t.clientX);
        }, { passive: false });
        progressTrack.addEventListener('touchend', (e) => {
            if (!touchSeekingProgress) return;
            e.stopPropagation();
            touchSeekingProgress = false; isDragging = false;
            progressTrack.classList.remove('dragging');
            scheduleHide();
        }, { passive: true });
        progressTrack.addEventListener('touchcancel', () => {
            touchSeekingProgress = false; isDragging = false;
            progressTrack.classList.remove('dragging');
        }, { passive: true });

        /* ── شريط الصوت: ماوس ── */
        let seekingVolume = false;
        function volFromClientX(clientX) {
            const rect = volumeTrack.getBoundingClientRect();
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            setVolume(x / rect.width);
        }
        volumeTrack.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            seekingVolume = true; isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            volFromClientX(e.clientX);
        });

        /* ── شريط الصوت: لمس ── */
        let touchSeekingVolume = false;
        let volumeTouchExpandTimer = null;
        volumeIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isMobileDevice()) {
                volumeWrap.classList.add('touch-expanded');
                clearTimeout(volumeTouchExpandTimer);
                volumeTouchExpandTimer = setTimeout(() => volumeWrap.classList.remove('touch-expanded'), 3000);
            }
            toggleMute();
        });
        volumeTrack.addEventListener('touchstart', (e) => {
            e.stopPropagation(); e.preventDefault();
            touchSeekingVolume = true; isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            volumeTrack.style.height = '6px';
            const t = e.touches[0];
            const rect = volumeTrack.getBoundingClientRect();
            setVolume(Math.max(0, Math.min((t.clientX - rect.left) / rect.width, 1)));
            clearTimeout(volumeTouchExpandTimer);
        }, { passive: false });
        volumeTrack.addEventListener('touchmove', (e) => {
            if (!touchSeekingVolume) return;
            e.stopPropagation(); e.preventDefault();
            const t = e.touches[0];
            const rect = volumeTrack.getBoundingClientRect();
            setVolume(Math.max(0, Math.min((t.clientX - rect.left) / rect.width, 1)));
        }, { passive: false });
        volumeTrack.addEventListener('touchend', (e) => {
            if (!touchSeekingVolume) return;
            e.stopPropagation();
            touchSeekingVolume = false; isDragging = false;
            volumeTrack.style.height = '';
            scheduleHide();
            volumeTouchExpandTimer = setTimeout(() => volumeWrap.classList.remove('touch-expanded'), 2000);
        }, { passive: true });
        volumeTrack.addEventListener('touchcancel', () => {
            touchSeekingVolume = false; isDragging = false;
            volumeTrack.style.height = '';
        }, { passive: true });

        /* ── الصوت ── */
        function updateVolumeUI(vol) {
            vol = Math.max(0, Math.min(1, vol));
            volumeFill.style.width = (vol * 100) + '%';
            const volumeThumb = volumeTrack.querySelector('.volume-thumb');
            if (volumeThumb) volumeThumb.style.left = (vol * 100) + '%';
            volumeIcon.innerHTML = vol === 0 ? SVG_VOL_OFF : SVG_VOL_ON;
        }
        function setVolume(vol) {
            vol = Math.max(0, Math.min(1, vol));
            ytVolume = Math.round(vol * 100);
            ytMuted  = vol === 0;
            if (ytMuted) {
                ytPostMessage('setVolume', 0);
                ytPostMessage('mute');
            } else {
                ytPostMessage('setVolume', ytVolume);
                ytPostMessage('unMute');
            }
            updateVolumeUI(vol);
        }
        function toggleMute() {
            if (ytMuted || ytVolume === 0) {
                const restore = iframeElement._lastVol !== undefined ? iframeElement._lastVol : 1;
                setVolume(restore);
            } else {
                iframeElement._lastVol = ytVolume / 100;
                setVolume(0);
            }
        }

        /* ── تشغيل / إيقاف ── */
        function updatePlayButton() {
            playBtn.innerHTML = ytPaused ? SVG_PLAY : SVG_PAUSE;
        }
        function pauseOthers() {
            allPlayers.forEach(p => {
                if (p.iframeElement !== iframeElement) ytPostMessage('pauseVideo');
            });
        }
        function playPause() {
            if (ytPaused) {
                pauseOthers();
                ytPostMessage('playVideo');
                showCenterIcon(false);
            } else {
                ytPostMessage('pauseVideo');
                showCenterIcon(true);
            }
        }
        function restartVideo() {
            ytPostMessage('seekTo', [0, true]);
            ytPostMessage('playVideo');
            showCenterIcon(false);
        }

        /* ── Seek ── */
        let seekAccumLeft = 0, seekAccumRight = 0;
        let seekResetTimerLeft = null, seekResetTimerRight = null;
        const SEEK_RESET_DELAY = 1000;

        function showFlash(side, seconds) {
            const el = side === 'left' ? flashLeft : flashRight;
            el.querySelector('span').textContent = (side === 'left' ? '-' : '+') + seconds + 's';
            el.classList.add('show');
            const key = '_hideTimer';
            clearTimeout(el[key]);
            el[key] = setTimeout(() => el.classList.remove('show'), 800);
        }

        function seekBy(seconds) {
            const side = seconds < 0 ? 'left' : 'right';
            if (side === 'left') {
                clearTimeout(seekResetTimerLeft);
                seekAccumLeft += Math.abs(seconds);
                ytCurrentTime = Math.max(0, ytCurrentTime - Math.abs(seconds));
                ytPostMessage('seekTo', [ytCurrentTime, true]);
                showFlash('left', seekAccumLeft);
                seekResetTimerLeft = setTimeout(() => { seekAccumLeft = 0; }, SEEK_RESET_DELAY);
            } else {
                clearTimeout(seekResetTimerRight);
                seekAccumRight += Math.abs(seconds);
                ytCurrentTime = Math.min(ytDuration || 0, ytCurrentTime + Math.abs(seconds));
                ytPostMessage('seekTo', [ytCurrentTime, true]);
                showFlash('right', seekAccumRight);
                seekResetTimerRight = setTimeout(() => { seekAccumRight = 0; }, SEEK_RESET_DELAY);
            }
            updateProgressBar();
            if (isSaving) saveCurrentPosition();
        }

        /* ── ظهور/إخفاء عناصر التحكم ── */
        let hideTimeout = null;
        let mobileControlsVisible = false;

        function showControls() {
            wrapper.classList.add('controls-visible');
            wrapper.classList.remove('cursor-hidden');
            if (isMobileDevice()) mobileControlsVisible = true;
        }
        function scheduleHide() {
            clearTimeout(hideTimeout);
            if (isDragging) return;
            hideTimeout = setTimeout(() => {
                if (!ytPaused && !isDragging) {
                    wrapper.classList.remove('controls-visible');
                    wrapper.classList.add('cursor-hidden');
                    if (isMobileDevice()) mobileControlsVisible = false;
                }
            }, 3000);
        }
        function updateControlsVisibility() {
            if (ytPaused) { showControls(); clearTimeout(hideTimeout); }
            else          { scheduleHide(); }
        }

        wrapper.addEventListener('mousemove', () => { showControls(); if (!ytPaused) scheduleHide(); });
        wrapper.addEventListener('mouseleave', () => {
            if (isDragging) return;
            if (!ytPaused) {
                clearTimeout(hideTimeout);
                wrapper.classList.remove('controls-visible', 'cursor-hidden');
                if (isMobileDevice()) mobileControlsVisible = false;
            }
        });

        /* ── حفظ موضع التشغيل ── */
        let isSaving   = false;
        let saveInterval = null;
        const storageKey = getStorageKey(originalSrc, 'pos');

        function updateSaveIcon() {
            saveBtn.innerHTML = isSaving ? SVG_SAVE_ACTIVE : SVG_SAVE_INACTIVE;
            isSaving ? saveBtn.classList.add('active') : saveBtn.classList.remove('active');
        }
        function saveCurrentPosition() {
            if (!isSaving || ytCurrentTime <= 0) return;
            try { localStorage.setItem(storageKey, ytCurrentTime.toString()); } catch(e) {}
        }
        function restoreSavedPosition() {
            if (!ytPlayerReady) return; // انتظر حتى جاهزية الـ iframe
            try {
                const saved = localStorage.getItem(storageKey);
                if (saved) {
                    const t = parseFloat(saved);
                    if (!isNaN(t) && t > 0) {
                        isSaving = true; updateSaveIcon();
                        ytPostMessage('seekTo', [t, true]);
                    }
                }
            } catch(e) {}
        }
        function startSaving() {
            isSaving = true; updateSaveIcon();
            saveCurrentPosition();
            saveInterval = setInterval(saveCurrentPosition, 1000);
        }
        function stopSaving() {
            isSaving = false; updateSaveIcon();
            clearInterval(saveInterval); saveInterval = null;
            try { localStorage.removeItem(storageKey); } catch(e) {}
        }
        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isSaving) stopSaving(); else startSaving();
        });

        /* ── fullscreen ── */
        function updateFullscreenButton() {
            fullscreenBtn.innerHTML = document.fullscreenElement ? SVG_FULLSCREEN_EXIT : SVG_FULLSCREEN_ENTER;
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) wrapper.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        }
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement === wrapper) document.body.classList.add('dideofullscreen');
            else if (!document.fullscreenElement)       document.body.classList.remove('dideofullscreen');
            updateFullscreenButton();
        });

        /* ── لوحة المفاتيح ── */
        wrapper.setAttribute('tabindex', '0');
        wrapper.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ': case 'k':
                    e.preventDefault();
                    if (activeMenuEl) { closeAll(); break; }
                    playPause(); break;
                case 'ArrowRight': e.preventDefault(); seekBy(5); break;
                case 'ArrowLeft':  e.preventDefault(); seekBy(-5); break;
                case 'ArrowUp':    e.preventDefault(); setVolume(ytVolume / 100 + 0.1); break;
                case 'ArrowDown':  e.preventDefault(); setVolume(ytVolume / 100 - 0.1); break;
                case 'f': e.preventDefault(); toggleFullscreen(); break;
                case 'm': e.preventDefault(); toggleMute(); break;
                case 'Escape': if (activeMenuEl) { e.preventDefault(); closeAll(); } break;
            }
        });

        /* ── اللمس على الـ blocker ── */
        const SCROLL_THRESHOLD = 10, TAP_MOVE_LIMIT = 8, TAP_DELAY = 300;
        let touchStartX = 0, touchStartY = 0, touchMoved = false, touchIsScrolling = false;
        let tapCount = 0, tapTimer = null, tapSide = null;

        blocker.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            touchStartX = t.clientX; touchStartY = t.clientY;
            touchMoved = false; touchIsScrolling = false;
        }, { passive: true });

        blocker.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const dx = Math.abs(t.clientX - touchStartX);
            const dy = Math.abs(t.clientY - touchStartY);
            if (!touchMoved && (dx > TAP_MOVE_LIMIT || dy > TAP_MOVE_LIMIT)) touchMoved = true;
            if (!touchIsScrolling && dy > SCROLL_THRESHOLD && dy > dx) touchIsScrolling = true;
            if (!touchIsScrolling) e.preventDefault();
        }, { passive: false });

        blocker.addEventListener('touchend', (e) => {
            if (touchIsScrolling || touchMoved) { touchIsScrolling = false; touchMoved = false; return; }
            e.preventDefault();
            if (activeMenuEl) {
                menuJustClosed = true; closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
                touchMoved = false; touchIsScrolling = false; return;
            }
            if (menuJustClosed) { touchMoved = false; touchIsScrolling = false; return; }
            if (!mobileControlsVisible) {
                showControls(); scheduleHide();
                touchMoved = false; touchIsScrolling = false; return;
            }
            const touch = e.changedTouches[0];
            const rect  = wrapper.getBoundingClientRect();
            const side  = (touch.clientX - rect.left) < rect.width / 2 ? 'left' : 'right';
            if (tapCount === 1 && tapSide === side) {
                clearTimeout(tapTimer); tapCount = 0; tapSide = null;
                seekBy(side === 'right' ? 5 : -5);
                showControls(); if (!ytPaused) scheduleHide();
            } else {
                tapCount = 1; tapSide = side;
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    if (tapCount === 1) { playPause(); showControls(); updateControlsVisibility(); }
                    tapCount = 0; tapSide = null;
                }, TAP_DELAY);

            const t = e.touches[0];
            const dx = Math.abs(t.clientX - touchStartX), dy = Math.abs(t.clientY - touchStartY);
            if (!touchMoved && (dx > TAP_MOVE_LIMIT || dy > TAP_MOVE_LIMIT)) touchMoved = true;
            if (!touchIsScrolling && dy > SCROLL_THRESHOLD && dy > dx) touchIsScrolling = true;
            if (!touchIsScrolling) e.preventDefault();
        }, { passive: false });
        wrapper.addEventListener('touchend', (e) => {
            const target = e.target;
            if (target.closest('.custom-controls') || target.closest('.cvp-settings-corner') || target.closest('.seek-flash')) return;
            if (touchIsScrolling || touchMoved) { touchIsScrolling = false; touchMoved = false; return; }
            e.preventDefault();
            if (activeMenuEl) {
                menuJustClosed = true; closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
                touchMoved = false; touchIsScrolling = false; return;
            }
            if (menuJustClosed) { touchMoved = false; touchIsScrolling = false; return; }
            if (!mobileControlsVisible) { showControls(); scheduleHide(); touchMoved = false; touchIsScrolling = false; return; }
            const touch = e.changedTouches[0];
            const rect  = wrapper.getBoundingClientRect();
            const side  = (touch.clientX - rect.left) < rect.width / 2 ? 'left' : 'right';
            if (tapCount === 1 && tapSide === side) {
                clearTimeout(tapTimer); tapCount = 0; tapSide = null;
                seekBy(side === 'right' ? 5 : -5);
                showControls(); if (!videoElement.paused) scheduleHide();
            } else {
                tapCount = 1; tapSide = side;
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    if (tapCount === 1) { playPause(); showControls(); updateControlsVisibility(); }
                    tapCount = 0; tapSide = null;
                }, TAP_DELAY);
            }
            touchMoved = false; touchIsScrolling = false;
        }, { passive: false });
        wrapper.addEventListener('touchcancel', () => { touchMoved = false; touchIsScrolling = false; }, { passive: true });

        wrapper.setAttribute('tabindex', '0');
        wrapper.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ': case 'k':
                    e.preventDefault();
                    if (activeMenuEl) { closeAll(); break; }
                    playPause(); break;
                case 'ArrowRight': e.preventDefault(); seekBy(5); break;
                case 'ArrowLeft':  e.preventDefault(); seekBy(-5); break;
                case 'ArrowUp':    e.preventDefault(); setVolume(videoElement.volume + 0.1); break;
                case 'ArrowDown':  e.preventDefault(); setVolume(videoElement.volume - 0.1); break;
                case 'f': e.preventDefault(); toggleFullscreen(); break;
                case 'm': e.preventDefault(); toggleMute(); break;
                case 'Escape': if (activeMenuEl) { e.preventDefault(); closeAll(); } break;
            }
        });

        function updateFullscreenButton() {
            fullscreenBtn.innerHTML = document.fullscreenElement ? SVG_FULLSCREEN_EXIT : SVG_FULLSCREEN_ENTER;
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) wrapper.requestFullscreen().catch(err => console.log(err.message));
            else document.exitFullscreen();
        }
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement === wrapper) document.body.classList.add('dideofullscreen');
            else if (!document.fullscreenElement)       document.body.classList.remove('dideofullscreen');
            updateFullscreenButton();
        });

        toggleScanBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (scanlineDiv.style.display === 'block') { scanlineDiv.style.display = 'none'; toggleScanBtn.classList.remove('active'); }
            else { scanlineDiv.style.display = 'block'; toggleScanBtn.classList.add('active'); }
        });
        scanlineDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); return; }
            if (menuJustClosed) return;
            playPause();
        });
        videoElement.addEventListener('click', (e) => {
            if (!isMobileDevice()) {
                e.stopPropagation();
                if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); return; }
                if (menuJustClosed) return;
                playPause();
            }
        });

        playBtn.addEventListener('click',       (e) => { e.stopPropagation(); playPause(); });
        restartBtn.addEventListener('click',    (e) => { e.stopPropagation(); restartVideo(); });
        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });

        videoElement.addEventListener('play',  () => { updatePlayButton(); updateControlsVisibility(); });
        videoElement.addEventListener('pause', () => { updatePlayButton(); updateControlsVisibility(); });
        videoElement.addEventListener('ended', () => { updatePlayButton(); updateControlsVisibility(); });

        showControls(); updatePlayButton(); updateTimeDisplay(); updateSaveIcon(); updateTotalTimeDisplay();

        return wrapper;
    };

    /* ============================================================
       تطبيق المشغّل على كل <video> و <iframe>
    ============================================================ */
    window.applyToAllVideos = function() {
        // فيديو عادي
        document.querySelectorAll('video:not([data-customized])').forEach(video => {
            customVideoPlayer(video);
            video.setAttribute('data-customized', 'true');
        });

        // iframe (يوتيوب / Vimeo / غيره)
        document.querySelectorAll('iframe:not([data-customized])').forEach(iframe => {
            const src = iframe.src || iframe.getAttribute('src') || '';
            // نتجاهل الـ iframes التي ليست فيديو
            const isVideo = /youtube\.com|youtu\.be|vimeo\.com|dailymotion\.com|facebook\.com\/plugins\/video|twitch\.tv/i.test(src);
            if (!isVideo) return;
            customIframePlayer(iframe);
            iframe.setAttribute('data-customized', 'true');
        });
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyToAllVideos);
    } else {
        applyToAllVideos();
    }

    const observer = new MutationObserver(mutations => {
        mutations.forEach(m => { if (m.addedNodes.length) applyToAllVideos(); });
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
    </script>
</body>
