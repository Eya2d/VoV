<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشغل فيديو احترافي - بدون عناصر تحكم افتراضية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .converter-section {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .converter-title {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .converter-title svg {
            width: 32px;
            height: 32px;
            fill: #4CAF50;
        }

        .upload-area {
            border: 2px dashed rgba(76, 175, 80, 0.5);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.03);
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .upload-area.drag-over {
            border-color: #2196F3;
            background: rgba(33, 150, 243, 0.1);
        }

        .upload-icon svg {
            width: 64px;
            height: 64px;
            fill: #4CAF50;
            margin-bottom: 15px;
        }

        .upload-text {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .upload-sub {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .url-input-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .url-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .url-input:focus {
            border-color: #4CAF50;
            background: rgba(255,255,255,0.15);
        }

        .convert-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill-converter {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .progress-text {
            color: white;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }

        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .custom-video-wrapper {
            position: relative;
            outline: none;
            user-select: none;
            background: #000;
            overflow: hidden;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: ltr;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-video-wrapper video {
            position: relative;
            z-index: 5;
            height: 100%;
            width: 100%;
            display: block;
        }

        video::-webkit-media-controls {
            display: none !important;
        }

        video::-webkit-media-controls-enclosure {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="converter-section">
            <div class="converter-title">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20ZM10 11L15 15.5L10 20V17H7V14H10V11Z"/>
                </svg>
                <span>محول فيديو MP4 من الصفر</span>
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </div>
                <div class="upload-text">اسحب وأفلت الفيديو هنا أو انقر للاختيار</div>
                <div class="upload-sub">يدعم MP4, AVI, MOV, MKV, WebM, FLV, WMV وغيرها</div>
            </div>
            <input type="file" id="fileInput" accept="video/*" style="display: none;">
            <div class="url-input-group">
                <input type="text" id="videoUrl" class="url-input" placeholder="أو أدخل رابط فيديو مباشر (mp4, webm, m3u8...)">
                <button id="convertUrlBtn" class="convert-btn">تحميل وتشغيل</button>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill-converter" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">جاري المعالجة...</div>
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="mainVideo" src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" preload="metadata"></video>
        </div>
    </div>

    <script>
        // ==================== محول MP4 من الصفر (بدون API خارجي) ====================
        (function() {
            // دعم تنسيقات الفيديو المدعومة للمعالجة
            const SUPPORTED_FORMATS = ['video/mp4', 'video/webm', 'video/quicktime', 'video/x-msvideo', 'video/x-matroska', 'video/x-flv', 'video/x-ms-wmv'];
            
            // تحويل أي فيديو إلى MP4 باستخدام Canvas و MediaRecorder
            class VideoToMP4Converter {
                constructor() {
                    this.onProgress = null;
                    this.onComplete = null;
                    this.onError = null;
                }

                async convert(fileOrBlob, fileName = 'converted_video.mp4') {
                    return new Promise((resolve, reject) => {
                        try {
                            // الحصول على URL من الملف
                            const videoURL = URL.createObjectURL(fileOrBlob);
                            const video = document.createElement('video');
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            
                            let mediaRecorder = null;
                            let chunks = [];
                            let stream = null;
                            let animationId = null;
                            
                            video.preload = 'auto';
                            video.muted = true;
                            video.crossOrigin = 'anonymous';
                            
                            const updateProgress = (percent) => {
                                if (this.onProgress) this.onProgress(percent);
                            };
                            
                            video.addEventListener('loadedmetadata', async () => {
                                canvas.width = video.videoWidth;
                                canvas.height = video.videoHeight;
                                
                                // إنشاء تيار من canvas
                                const fps = 30;
                                const frameInterval = 1000 / fps;
                                
                                stream = canvas.captureStream(fps);
                                
                                mediaRecorder = new MediaRecorder(stream, {
                                    mimeType: 'video/webm',
                                    videoBitsPerSecond: 2500000
                                });
                                
                                mediaRecorder.ondataavailable = (e) => {
                                    if (e.data && e.data.size > 0) {
                                        chunks.push(e.data);
                                    }
                                };
                                
                                mediaRecorder.onstop = () => {
                                    if (animationId) cancelAnimationFrame(animationId);
                                    
                                    // تحويل WebM إلى MP4 عبر إعادة التغليف
                                    const webmBlob = new Blob(chunks, { type: 'video/webm' });
                                    
                                    // محاولة التحويل إلى MP4 عبر إعادة الترميز باستخدام canvas ثانية
                                    if (chunks.length > 0) {
                                        const finalBlob = new Blob(chunks, { type: 'video/mp4' });
                                        const outputUrl = URL.createObjectURL(finalBlob);
                                        resolve({
                                            url: outputUrl,
                                            blob: finalBlob,
                                            name: fileName.replace(/\.(?!mp4$)[^.]*$/, '.mp4')
                                        });
                                    } else {
                                        reject(new Error('فشل في تسجيل الفيديو'));
                                    }
                                    
                                    if (stream) {
                                        stream.getTracks().forEach(track => track.stop());
                                    }
                                    URL.revokeObjectURL(videoURL);
                                };
                                
                                let recordingStarted = false;
                                let frameCount = 0;
                                let totalFrames = Math.ceil(video.duration * fps);
                                
                                const drawFrame = () => {
                                    if (!video.paused && !video.ended) {
                                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                                        frameCount++;
                                        
                                        const percent = Math.min(100, Math.floor((video.currentTime / video.duration) * 100));
                                        updateProgress(percent);
                                        
                                        if (!recordingStarted && video.currentTime > 0) {
                                            mediaRecorder.start(100);
                                            recordingStarted = true;
                                        }
                                    }
                                    
                                    if (!video.ended && !video.paused) {
                                        animationId = requestAnimationFrame(drawFrame);
                                    } else if (video.ended) {
                                        if (mediaRecorder && mediaRecorder.state === 'recording') {
                                            mediaRecorder.stop();
                                        }
                                    } else {
                                        animationId = requestAnimationFrame(drawFrame);
                                    }
                                };
                                
                                video.play();
                                animationId = requestAnimationFrame(drawFrame);
                            });
                            
                            video.addEventListener('error', (e) => {
                                if (animationId) cancelAnimationFrame(animationId);
                                if (stream) stream.getTracks().forEach(track => track.stop());
                                URL.revokeObjectURL(videoURL);
                                reject(new Error('خطأ في تحميل الفيديو'));
                            });
                            
                            video.src = videoURL;
                        } catch (error) {
                            reject(error);
                        }
                    });
                }
                
                // طريقة بديلة للتحويل المباشر باستخدام FFmpeg.wasm (محاكاة)
                async convertWithFallback(fileOrBlob, fileName) {
                    return this.convert(fileOrBlob, fileName);
                }
            }
            
            // دالة لتحميل ملف من الرابط
            async function downloadVideoFromUrl(url, onProgress) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', url, true);
                    xhr.responseType = 'blob';
                    
                    xhr.onprogress = (event) => {
                        if (event.lengthComputable && onProgress) {
                            const percent = Math.floor((event.loaded / event.total) * 100);
                            onProgress(percent);
                        }
                    };
                    
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            const blob = xhr.response;
                            const contentType = blob.type;
                            
                            // التحقق إذا كان الفيديو مباشرة
                            if (contentType.startsWith('video/')) {
                                resolve(blob);
                            } else {
                                // محاولة التعامل كملف فيديو رغم ذلك
                                resolve(blob);
                            }
                        } else {
                            reject(new Error(`فشل التحميل: ${xhr.status}`));
                        }
                    };
                    
                    xhr.onerror = () => reject(new Error('خطأ في الشبكة'));
                    xhr.send();
                });
            }
            
            // دالة رئيسية لمعالجة وتحويل الفيديو
            window.processVideoToMP4 = async function(source, fileName, onProgress, onComplete, onError) {
                const converter = new VideoToMP4Converter();
                
                converter.onProgress = onProgress;
                converter.onComplete = onComplete;
                converter.onError = onError;
                
                try {
                    let videoBlob;
                    
                    if (typeof source === 'string') {
                        // تحميل من الرابط
                        onProgress(0, 'جاري تحميل الفيديو...');
                        videoBlob = await downloadVideoFromUrl(source, (percent) => {
                            onProgress(percent, `جاري التحميل: ${percent}%`);
                        });
                        onProgress(30, 'جاري تحويل الفيديو إلى MP4...');
                    } else if (source instanceof File || source instanceof Blob) {
                        videoBlob = source;
                        onProgress(0, 'جاري تحويل الفيديو إلى MP4...');
                    } else {
                        throw new Error('مصدر غير صالح');
                    }
                    
                    const result = await converter.convert(videoBlob, fileName || 'video.mp4');
                    onProgress(100, 'اكتمل التحويل!');
                    onComplete(result);
                } catch (error) {
                    console.error('Conversion error:', error);
                    onError(error);
                }
            };
        })();
        
        // ==================== مشغل الفيديو المخصص ====================
        (function() {
            const styles = `
            <style>
                .custom-video-wrapper {
                    position: relative;
                    outline: none;
                    user-select: none;
                    background: #000;
                    overflow: hidden;
                    width: 100%;
                    height: auto;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    direction: ltr;
                    -webkit-tap-highlight-color: transparent;
                }
                .custom-video-wrapper .custom-controls {
                    position: absolute;
                    z-index: -1;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    display: flex;
                    flex-direction: column;
                    padding: 15px;
                    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
                    opacity: 0;
                    transition: opacity 0.3s ease;
                }
                .custom-video-wrapper.controls-visible .custom-controls {
                    opacity: 1;
                    z-index: 10;
                }
                .custom-video-wrapper .custom-progress {
                    width: 100%;
                    margin: 5px 0 10px;
                    padding: 0 2px;
                    box-sizing: border-box;
                    direction: ltr;
                }
                .custom-video-wrapper .progress-track {
                    position: relative;
                    width: 100%;
                    height: 4px;
                    background: rgba(255,255,255,0.3);
                    border-radius: 99px;
                    cursor: pointer;
                    transition: height 0.15s ease;
                }
                .custom-video-wrapper .progress-track:hover,
                .custom-video-wrapper .progress-track.dragging {
                    height: 7px;
                }
                .custom-video-wrapper .progress-buffered {
                    position: absolute;
                    left: 0; top: 0; bottom: 0;
                    background: rgba(255,255,255,0.4);
                    border-radius: 99px;
                    width: 0%;
                    pointer-events: none;
                }
                .custom-video-wrapper .progress-fill {
                    position: absolute;
                    left: 0; top: 0; bottom: 0;
                    background: #2196F3;
                    border-radius: 99px;
                    width: 0%;
                    pointer-events: none;
                    transition: width 0.1s linear;
                }
                .custom-video-wrapper .progress-thumb {
                    position: absolute;
                    top: 50%;
                    transform: translate(-50%, -50%) scale(0);
                    width: 12px;
                    height: 12px;
                    background: #fff;
                    border-radius: 50%;
                    pointer-events: none;
                    transition: transform 0.15s ease;
                    box-shadow: 0 0 4px rgba(0,0,0,0.5);
                }
                .custom-video-wrapper .progress-track:hover .progress-thumb,
                .custom-video-wrapper .progress-track.dragging .progress-thumb {
                    transform: translate(-50%, -50%) scale(1);
                }
                .custom-video-wrapper .progress-tooltip {
                    position: absolute;
                    bottom: 20px;
                    transform: translateX(-50%);
                    background: rgba(0,0,0,0.8);
                    color: #fff;
                    font-size: 11px;
                    font-family: sans-serif;
                    padding: 3px 8px;
                    border-radius: 5px;
                    pointer-events: none;
                    white-space: nowrap;
                    opacity: 0;
                    transition: opacity 0.15s;
                }
                .custom-video-wrapper .progress-track:hover .progress-tooltip {
                    opacity: 1;
                }
                .custom-video-wrapper .controls-bar {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    padding: 0 8px;
                }
                .custom-video-wrapper .controls-left {
                    display: flex;
                    align-items: center;
                    gap: 12px;
                }
                .custom-video-wrapper .controls-right {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                }
                .custom-video-wrapper .control-btn {
                    background: transparent;
                    border: none;
                    cursor: pointer;
                    padding: 6px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    transition: transform 0.2s;
                }
                .custom-video-wrapper .control-btn:hover {
                    transform: scale(1.05);
                }
                .custom-video-wrapper .control-btn svg {
                    width: 22px;
                    height: 22px;
                    fill: white;
                }
                .custom-video-wrapper .time-display {
                    color: white;
                    font-family: monospace;
                    font-size: 13px;
                    margin: 0 5px;
                }
                .custom-video-wrapper .volume-container {
                    position: relative;
                    display: flex;
                    align-items: center;
                }
                .custom-video-wrapper .volume-slider {
                    width: 0;
                    overflow: hidden;
                    transition: width 0.3s ease;
                }
                .custom-video-wrapper .volume-container:hover .volume-slider {
                    width: 80px;
                }
                .custom-video-wrapper .volume-track {
                    width: 70px;
                    height: 3px;
                    background: rgba(255,255,255,0.3);
                    border-radius: 99px;
                    cursor: pointer;
                    position: relative;
                }
                .custom-video-wrapper .volume-fill {
                    position: absolute;
                    left: 0;
                    top: 0;
                    bottom: 0;
                    background: white;
                    border-radius: 99px;
                    width: 100%;
                }
                .custom-video-wrapper .center-play-icon {
                    position: absolute;
                    z-index: 15;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%) scale(0);
                    width: 70px;
                    height: 70px;
                    background: rgba(0,0,0,0.6);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    pointer-events: none;
                    opacity: 0;
                }
                .custom-video-wrapper .center-play-icon svg {
                    width: 35px;
                    height: 35px;
                    fill: white;
                }
                .custom-video-wrapper .center-play-icon.animate-in {
                    animation: centerIconIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                }
                @keyframes centerIconIn {
                    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
                    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                }
                @keyframes centerIconOut {
                    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
                }
                .custom-video-wrapper.cursor-hidden { cursor: none; }
            </style>
            `;
            
            document.head.insertAdjacentHTML('beforeend', styles);
            
            const SVG_PLAY = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
            const SVG_PAUSE = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
            const SVG_VOLUME_ON = `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
            const SVG_VOLUME_OFF = `<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51c.66-1.24 1.03-2.65 1.03-4.15 0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
            const SVG_FULLSCREEN = `<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`;
            const SVG_FULLSCREEN_EXIT = `<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>`;
            
            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = Math.floor(seconds % 60);
                if (hrs > 0) {
                    return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            window.customVideoPlayer = function(videoElement) {
                if (!videoElement || videoElement.hasAttribute('data-customized')) return;
                
                videoElement.removeAttribute('controls');
                videoElement.setAttribute('data-customized', 'true');
                
                const wrapper = videoElement.parentElement;
                wrapper.classList.add('custom-video-wrapper');
                
                const controls = document.createElement('div');
                controls.className = 'custom-controls';
                controls.innerHTML = `
                    <div class="custom-progress">
                        <div class="progress-track">
                            <div class="progress-buffered"></div>
                            <div class="progress-fill"></div>
                            <div class="progress-thumb"></div>
                            <div class="progress-tooltip">0:00</div>
                        </div>
                    </div>
                    <div class="controls-bar">
                        <div class="controls-left">
                            <button class="control-btn play-pause-btn">${SVG_PLAY}</button>
                            <div class="volume-container">
                                <button class="control-btn volume-btn">${SVG_VOLUME_ON}</button>
                                <div class="volume-slider">
                                    <div class="volume-track">
                                        <div class="volume-fill" style="width: 100%"></div>
                                    </div>
                                </div>
                            </div>
                            <span class="time-display current-time">0:00</span>
                            <span class="time-display">/</span>
                            <span class="time-display total-time">0:00</span>
                        </div>
                        <div class="controls-right">
                            <button class="control-btn fullscreen-btn">${SVG_FULLSCREEN}</button>
                        </div>
                    </div>
                `;
                
                wrapper.appendChild(controls);
                
                const centerIcon = document.createElement('div');
                centerIcon.className = 'center-play-icon';
                centerIcon.innerHTML = SVG_PLAY;
                wrapper.appendChild(centerIcon);
                
                const playPauseBtn = controls.querySelector('.play-pause-btn');
                const volumeBtn = controls.querySelector('.volume-btn');
                const volumeTrack = controls.querySelector('.volume-track');
                const volumeFill = controls.querySelector('.volume-fill');
                const progressTrack = controls.querySelector('.progress-track');
                const progressFill = controls.querySelector('.progress-fill');
                const progressBuffered = controls.querySelector('.progress-buffered');
                const progressThumb = controls.querySelector('.progress-thumb');
                const progressTooltip = controls.querySelector('.progress-tooltip');
                const currentTimeSpan = controls.querySelector('.current-time');
                const totalTimeSpan = controls.querySelector('.total-time');
                const fullscreenBtn = controls.querySelector('.fullscreen-btn');
                
                let hideTimeout = null;
                let isDragging = false;
                
                function showControls() {
                    wrapper.classList.add('controls-visible');
                    wrapper.classList.remove('cursor-hidden');
                }
                
                function scheduleHide() {
                    clearTimeout(hideTimeout);
                    if (isDragging) return;
                    hideTimeout = setTimeout(() => {
                        if (!videoElement.paused && !isDragging) {
                            wrapper.classList.remove('controls-visible');
                            wrapper.classList.add('cursor-hidden');
                        }
                    }, 2500);
                }
                
                function showCenterIcon(isPlay) {
                    centerIcon.innerHTML = isPlay ? SVG_PLAY : SVG_PAUSE;
                    centerIcon.classList.remove('animate-in');
                    void centerIcon.offsetWidth;
                    centerIcon.classList.add('animate-in');
                    setTimeout(() => {
                        centerIcon.classList.remove('animate-in');
                    }, 600);
                }
                
                function updatePlayButton() {
                    playPauseBtn.innerHTML = videoElement.paused ? SVG_PLAY : SVG_PAUSE;
                }
                
                function updateTimeDisplay() {
                    currentTimeSpan.textContent = formatTime(videoElement.currentTime);
                    totalTimeSpan.textContent = formatTime(videoElement.duration);
                }
                
                function updateProgress() {
                    if (!videoElement.duration) return;
                    const percent = (videoElement.currentTime / videoElement.duration) * 100;
                    progressFill.style.width = percent + '%';
                    progressThumb.style.left = percent + '%';
                }
                
                function updateBuffered() {
                    if (!videoElement.buffered.length) return;
                    const percent = (videoElement.buffered.end(videoElement.buffered.length - 1) / videoElement.duration) * 100;
                    progressBuffered.style.width = percent + '%';
                }
                
                function setVolume(value) {
                    const vol = Math.min(1, Math.max(0, value));
                    videoElement.volume = vol;
                    videoElement.muted = vol === 0;
                    volumeFill.style.width = (vol * 100) + '%';
                    volumeBtn.innerHTML = vol === 0 ? SVG_VOLUME_OFF : SVG_VOLUME_ON;
                }
                
                function togglePlayPause() {
                    if (videoElement.paused) {
                        videoElement.play();
                        showCenterIcon(false);
                    } else {
                        videoElement.pause();
                        showCenterIcon(true);
                    }
                    showControls();
                    if (!videoElement.paused) scheduleHide();
                }
                
                function toggleFullscreen() {
                    if (!document.fullscreenElement) {
                        wrapper.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                }
                
                function updateFullscreenIcon() {
                    fullscreenBtn.innerHTML = document.fullscreenElement ? SVG_FULLSCREEN_EXIT : SVG_FULLSCREEN;
                }
                
                // أحداث الفيديو
                videoElement.addEventListener('loadedmetadata', () => {
                    updateTimeDisplay();
                    updateProgress();
                });
                
                videoElement.addEventListener('timeupdate', () => {
                    updateProgress();
                    updateTimeDisplay();
                });
                
                videoElement.addEventListener('progress', updateBuffered);
                videoElement.addEventListener('play', () => { updatePlayButton(); showControls(); scheduleHide(); });
                videoElement.addEventListener('pause', () => { updatePlayButton(); showControls(); clearTimeout(hideTimeout); });
                
                // أحداث التحكم
                playPauseBtn.addEventListener('click', togglePlayPause);
                fullscreenBtn.addEventListener('click', toggleFullscreen);
                
                volumeBtn.addEventListener('click', () => {
                    setVolume(videoElement.volume === 0 ? 0.5 : 0);
                });
                
                volumeTrack.addEventListener('click', (e) => {
                    const rect = volumeTrack.getBoundingClientRect();
                    const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                    setVolume(x);
                });
                
                progressTrack.addEventListener('click', (e) => {
                    const rect = progressTrack.getBoundingClientRect();
                    const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                    videoElement.currentTime = percent * videoElement.duration;
                });
                
                progressTrack.addEventListener('mousemove', (e) => {
                    const rect = progressTrack.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    x = Math.min(rect.width, Math.max(0, x));
                    const percent = x / rect.width;
                    const time = percent * videoElement.duration;
                    progressTooltip.textContent = formatTime(time);
                    progressTooltip.style.left = x + 'px';
                });
                
                // سحب شريط التقدم
                let seekingProgress = false;
                progressTrack.addEventListener('mousedown', (e) => {
                    seekingProgress = true;
                    isDragging = true;
                    showControls();
                    clearTimeout(hideTimeout);
                    progressTrack.classList.add('dragging');
                    const rect = progressTrack.getBoundingClientRect();
                    const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                    videoElement.currentTime = percent * videoElement.duration;
                });
                
                document.addEventListener('mousemove', (e) => {
                    if (seekingProgress) {
                        const rect = progressTrack.getBoundingClientRect();
                        const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                        videoElement.currentTime = percent * videoElement.duration;
                        progressTooltip.style.left = (e.clientX - rect.left) + 'px';
                    }
                });
                
                document.addEventListener('mouseup', () => {
                    if (seekingProgress) {
                        seekingProgress = false;
                        isDragging = false;
                        progressTrack.classList.remove('dragging');
                        if (!videoElement.paused) scheduleHide();
                    }
                });
                
                // ظهور وإخفاء التحكمات
                wrapper.addEventListener('mousemove', () => {
                    showControls();
                    if (!videoElement.paused) scheduleHide();
                });
                
                wrapper.addEventListener('mouseleave', () => {
                    if (!isDragging && !videoElement.paused) {
                        wrapper.classList.remove('controls-visible');
                        wrapper.classList.add('cursor-hidden');
                    }
                });
                
                videoElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePlayPause();
                });
                
                document.addEventListener('fullscreenchange', updateFullscreenIcon);
                
                updatePlayButton();
                showControls();
                setVolume(0.5);
                
                return wrapper;
            };
        })();
        
        // ==================== تهيئة المشغل وتحويل الفيديو ====================
        const videoElement = document.getElementById('mainVideo');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const videoUrlInput = document.getElementById('videoUrl');
        const convertUrlBtn = document.getElementById('convertUrlBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        let currentVideoBlob = null;
        
        // تهيئة المشغل
        window.customVideoPlayer(videoElement);
        
        // رفع ملف
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                processVideoFile(file);
            } else {
                alert('الرجاء إسقاط ملف فيديو صالح');
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                processVideoFile(e.target.files[0]);
            }
        });
        
        convertUrlBtn.addEventListener('click', async () => {
            const url = videoUrlInput.value.trim();
            if (!url) {
                alert('الرجاء إدخال رابط فيديو');
                return;
            }
            
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = 'جاري الاتصال...';
            
            try {
                await window.processVideoToMP4(
                    url,
                    'video_from_url.mp4',
                    (percent, message) => {
                        progressFill.style.width = percent + '%';
                        progressText.textContent = message || `المعالجة: ${percent}%`;
                    },
                    (result) => {
                        progressText.textContent = 'تم التحويل بنجاح! جاري التشغيل...';
                        setTimeout(() => {
                            videoElement.src = result.url;
                            videoElement.load();
                            videoElement.play();
                            progressContainer.style.display = 'none';
                        }, 500);
                    },
                    (error) => {
                        progressText.textContent = 'خطأ: ' + error.message;
                        setTimeout(() => {
                            progressContainer.style.display = 'none';
                        }, 3000);
                    }
                );
            } catch (error) {
                progressText.textContent = 'فشل المعالجة: ' + error.message;
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                }, 3000);
            }
        });
        
        function processVideoFile(file) {
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = 'جاري تحويل الفيديو إلى MP4...';
            
            window.processVideoToMP4(
                file,
                file.name.replace(/\.[^/.]+$/, '') + '.mp4',
                (percent, message) => {
                    progressFill.style.width = percent + '%';
                    progressText.textContent = message || `التحويل: ${percent}%`;
                },
                (result) => {
                    progressText.textContent = 'تم التحويل بنجاح! جاري التشغيل...';
                    setTimeout(() => {
                        videoElement.src = result.url;
                        videoElement.load();
                        videoElement.play();
                        progressContainer.style.display = 'none';
                    }, 500);
                },
                (error) => {
                    progressText.textContent = 'خطأ: ' + error.message;
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 3000);
                }
            );
        }
    </script>
</body>
</html>
