    const SPEED_OPTIONS = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];

    const ANIM_DURATION = 180;

    function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
            || (navigator.maxTouchPoints > 1);
    }

    function formatTime(s) {
        if (isNaN(s) || s < 0) return '0:00';
        s = Math.floor(s);
        const h   = Math.floor(s / 3600);
        const m   = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0) {
            return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        }
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function getStorageKey(src, suffix = 'pos') {
        const hash = btoa(encodeURIComponent(src)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 60);
        return `cvp_${suffix}_${hash}`;
    }

    /* =========================================================
       كشف نوع الـ iframe
    ========================================================= */
    function detectIframeType(src) {
        if (!src) return 'unknown';
        if (/youtube\.com\/embed|youtu\.be\/embed|youtube-nocookie\.com\/embed/.test(src)) return 'youtube';
        if (/player\.vimeo\.com/.test(src)) return 'vimeo';
        if (/dailymotion\.com\/embed/.test(src)) return 'dailymotion';
        return 'generic';
    }

    /* تأكد أن رابط يوتيوب يحتوي على enablejsapi=1 وorigin */
    function ensureYouTubeParams(src) {
        try {
            const url = new URL(src);
            url.searchParams.set('enablejsapi', '1');
            url.searchParams.set('origin', window.location.origin);
            // autoplay=0 حتى لا يبدأ تلقائياً
            if (!url.searchParams.has('autoplay')) url.searchParams.set('autoplay', '0');
            return url.toString();
        } catch(e) { return src; }
    }

    /* تأكد أن رابط Vimeo يحتوي على api=1 */
    function ensureVimeoParams(src) {
        try {
            const url = new URL(src);
            url.searchParams.set('api', '1');
            return url.toString();
        } catch(e) { return src; }
    }

    const allPlayers = [];

    window.addEventListener('beforeunload', () => {
        allPlayers.forEach(p => {
            if (p.saveCurrentPosition) p.saveCurrentPosition();
            if (p.saveCurrentVolume) p.saveCurrentVolume();
        });
    });

    /* =========================================================
       الدالة الرئيسية للـ video element (كما كانت بالضبط)
    ========================================================= */
    window.customVideoPlayer = function(videoElement) {
        if (!videoElement) return;

        videoElement.removeAttribute('controls');
        videoElement.preload = 'metadata';

        const wrapper = document.createElement('div');
        wrapper.className = 'custom-video-wrapper loading';
        videoElement.parentNode.insertBefore(wrapper, videoElement);
        wrapper.appendChild(videoElement);

        /* flash overlays */
        const flashLeft  = document.createElement('div');
        flashLeft.className  = 'seek-flash left';
        flashLeft.innerHTML  = SVG_SEEK_BACK + '<span>-5s</span>';
        const flashRight = document.createElement('div');
        flashRight.className = 'seek-flash right';
        flashRight.innerHTML = SVG_SEEK_FWD + '<span>+5s</span>';
        wrapper.appendChild(flashLeft);
        wrapper.appendChild(flashRight);

        /* أيقونة التشغيل/الإيقاف في المنتصف */
        const centerIcon = document.createElement('div');
        centerIcon.className = 'center-play-icon';
        centerIcon.innerHTML = SVG_PLAY;
        wrapper.appendChild(centerIcon);

        let centerIconTimer = null;
        function showCenterIcon(isPlay) {
            centerIcon.innerHTML = isPlay ? SVG_PLAY : SVG_PAUSE;
            clearTimeout(centerIconTimer);
            centerIcon.classList.remove('animate-out');
            void centerIcon.offsetWidth;
            centerIcon.classList.add('animate-in');
            centerIconTimer = setTimeout(() => {
                centerIcon.classList.remove('animate-in');
                centerIcon.classList.add('animate-out');
            }, 600);
        }

        const scanlineDiv = document.createElement('div');
        scanlineDiv.className = 'xxxxddcvf';
        scanlineDiv.innerHTML = '<div class="xxxxdww"></div>';
        wrapper.appendChild(scanlineDiv);

        /* ===== زر الإعدادات ===== */
        const settingsCorner = document.createElement('div');
        settingsCorner.className = 'cvp-settings-corner';

        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'cvp-settings-btn';
        settingsBtn.title = 'الإعدادات';
        settingsBtn.innerHTML = SVG_SETTINGS;

        settingsCorner.appendChild(settingsBtn);
        wrapper.appendChild(settingsCorner);

        let currentSpeed  = DEFAULT_SPEED;
        let activeMenuEl  = null;
        let backdropEl    = null;
        let isAnimating   = false;

        let menuJustClosed = false;

        let isDragging = false;

        function getSpeedLabel(s) {
            return s === 1 ? 'عادي' : s + 'x';
        }

        function buildSettingsMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-settings-menu';
            menu.innerHTML = `
                <button class="cvp-settings-menu-item cvp-speed-trigger">
                    ${SVG_SPEED}
                    <span>سرعة التشغيل</span>
                    <span class="cvp-menu-item-right">
                        <span class="cvp-current-speed-label">${getSpeedLabel(currentSpeed)}</span>
                        ${SVG_ARROW_RIGHT}
                    </span>
                </button>
            `;
            menu.querySelector('.cvp-speed-trigger').addEventListener('click', (e) => {
                e.stopPropagation();
                swapMenu('speed');
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function buildSpeedMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-speed-menu';
            let html = `
                <div class="cvp-speed-menu-header">
                    <button class="cvp-speed-back-btn" title="رجوع">${SVG_ARROW_LEFT}</button>
                    <span class="cvp-speed-menu-title">سرعة التشغيل</span>
                </div>
            `;
            SPEED_OPTIONS.forEach(speed => {
                const label       = speed === 1 ? 'عادي (1x)' : speed + 'x';
                const activeClass = speed === currentSpeed ? 'active' : '';
                html += `
                    <button class="cvp-speed-option ${activeClass}" data-speed="${speed}">
                        <span>${label}</span>
                        <span class="cvp-speed-check">${SVG_CHECK}</span>
                    </button>
                `;
            });
            menu.innerHTML = html;
            menu.querySelector('.cvp-speed-back-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                swapMenu('settings');
            });
            menu.querySelectorAll('.cvp-speed-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const speed = parseFloat(opt.dataset.speed);
                    currentSpeed = speed;
                    videoElement.playbackRate = speed;
                    closeAll();
                });
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function createBackdrop() {
            const bd = document.createElement('div');
            bd.className = 'cvp-backdrop';
            bd.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                menuJustClosed = true;
                closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
            });
            bd.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                menuJustClosed = true;
                closeAll();
                setTimeout(() => { menuJustClosed = false; }, 300);
            }, { passive: true });
            return bd;
        }

        function mountMenu(menuEl) {
            if (!backdropEl) {
                backdropEl = createBackdrop();
                wrapper.insertBefore(backdropEl, settingsCorner);
            }
            settingsCorner.appendChild(menuEl);
            activeMenuEl = menuEl;
            settingsBtn.classList.add('open');
            wrapper.classList.add('settings-open');
        }

        function unmountCurrent(callback) {
            if (!activeMenuEl) { if (callback) callback(); return; }
            const el = activeMenuEl;
            activeMenuEl = null;
            el.classList.add('hiding');
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
                if (callback) callback();
            }, ANIM_DURATION);
        }

        function unmountBackdrop() {
            if (!backdropEl) return;
            const bd = backdropEl;
            backdropEl = null;
            bd.classList.add('hiding');
            setTimeout(() => {
                if (bd.parentNode) bd.parentNode.removeChild(bd);
            }, ANIM_DURATION);
        }

        function openSettings() {
            if (isAnimating) return;
            isAnimating = true;
            const menu = buildSettingsMenu();
            mountMenu(menu);
            setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
        }

        function swapMenu(target) {
            if (isAnimating) return;
            isAnimating = true;
            unmountCurrent(() => {
                const menu = target === 'speed' ? buildSpeedMenu() : buildSettingsMenu();
                settingsCorner.appendChild(menu);
                activeMenuEl = menu;
                setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
            });
        }

        function closeAll() {
            settingsBtn.classList.remove('open');
            unmountCurrent();
            unmountBackdrop();
            wrapper.classList.remove('settings-open');
        }

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeMenuEl) {

    /* =========================================================

    window.customIframePlayer = function(iframeElement) {

        centerIcon.innerHTML = SVG_PLAY;

                if (window._cvpYTReadyCallbacks) {

        function createYTPlayer() {
            if (ytPlayer) return;
            /* نستخرج videoId من الـ src */
            let videoId = '';
            try {
                const url = new URL(finalSrc);
                /* /embed/VIDEO_ID */
                const parts = url.pathname.split('/');
                videoId = parts[parts.length - 1] || parts[parts.length - 2];
            } catch(e) {}

            if (iframeElement.parentNode) iframeElement.parentNode.replaceChild(placeholder, iframeElement);

                height: '100%',
                playerVars: {
                    controls: 0,        /* نخفي كونترولز يوتيوب */
                    disablekb: 1,       /* نعطل لوحة مفاتيح يوتيوب */
                    modestbranding: 1,
                    rel: 0,
                    iv_load_policy: 3,
                    playsinline: 1,

                        /* ضبط الصوت المحفوظ */
                        restoreIframeVolume();
                        /* استعادة الموضع المحفوظ */
                        restoreIframeSavedPosition();

                        const newIframe = wrapper.querySelector('iframe');
                        if (newIframe) {
                            newIframe.style.pointerEvents = 'none';
                            newIframe.style.zIndex = '5';
                        }
                    },
                    onStateChange: function(event) {
                        const s = event.data;
                        if (s === YT.PlayerState.PLAYING) {
                            iframePaused = false;
                            updatePlayButton();
                            scheduleHide();
                            startProgressTimer();
                        } else if (s === YT.PlayerState.PAUSED || s === YT.PlayerState.ENDED) {
                            iframePaused = true;
                            updatePlayButton();
                            showControls();
                            clearTimeout(hideTimeout);
                            stopProgressTimer();
                            if (s === YT.PlayerState.ENDED) {

                            }

                        }

                    onError: function() {
                        wrapper.classList.remove('loading');
                        setControlsDisabled(false);
                    }
                }
            });

        /* ===== Vimeo postMessage API ===== */
        function initVimeoAPI() {
            /* نرسل أوامر عبر postMessage لـ Vimeo */
            wrapper.classList.remove('loading');
            setControlsDisabled(false);

            window.addEventListener('message', handleVimeoMessage);

            /* نطلب مدة الفيديو */
            setTimeout(() => {
                sendVimeoCommand('getDuration');
                sendVimeoCommand('getVolume');
            }, 1000);
        }

        function sendVimeoCommand(method, value) {
            const data = JSON.stringify({ method: method, value: value });
            try { iframeElement.contentWindow.postMessage(data, '*'); } catch(e) {}
        }

        function handleVimeoMessage(e) {
            let data;
            try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(ex) { return; }
            if (!data || data.player_id !== iframeElement.id) {
                /* Vimeo لا يُرسل player_id دائماً، نتحقق من الـ event */
            }
            if (data.event === 'ready') {
                /* نسجّل الأحداث */
                sendVimeoCommand('addEventListener', 'play');
                sendVimeoCommand('addEventListener', 'pause');
                sendVimeoCommand('addEventListener', 'finish');
                sendVimeoCommand('addEventListener', 'timeupdate');
                sendVimeoCommand('addEventListener', 'duration');
            }
            if (data.event === 'play')   { iframePaused = false; updatePlayButton(); scheduleHide(); }
            if (data.event === 'pause')  { iframePaused = true;  updatePlayButton(); showControls(); }
            if (data.event === 'finish') { iframePaused = true;  updatePlayButton(); showControls(); }
            if (data.event === 'timeupdate' && data.data) {
                iframeCurrentTime = data.data.seconds || 0;
                iframeDuration    = data.data.duration || iframeDuration;
                updateProgressBarIframe();
                updateTimeDisplayIframe();
            }
            if (data.event === 'duration' && data.data) {
                iframeDuration = data.data;
                updateTotalTimeDisplay();
            }
        }

        /* ===== Generic iframe (Dailymotion وغيره عبر postMessage) ===== */
        function initGenericAPI() {
            wrapper.classList.remove('loading');
            setControlsDisabled(false);

            window.addEventListener('message', handleGenericMessage);
        }

        function handleGenericMessage(e) {
            let data;
            try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(ex) { return; }
            if (!data) return;

            /* Dailymotion */
            if (data.event === 'apiready') {
                try {
                    iframeElement.contentWindow.postMessage(JSON.stringify({ command: 'play' }), '*');
                    iframeElement.contentWindow.postMessage(JSON.stringify({ command: 'pause' }), '*');
                } catch(ex) {}
            }
            if (data.event === 'play' || data.type === 'play')   { iframePaused = false; updatePlayButton(); scheduleHide(); }
            if (data.event === 'pause'|| data.type === 'pause')  { iframePaused = true;  updatePlayButton(); showControls(); }
            if (data.event === 'ended'|| data.type === 'ended')  { iframePaused = true;  updatePlayButton(); showControls(); }
            if ((data.event === 'timeupdate' || data.type === 'timeupdate') && data.time !== undefined) {
                iframeCurrentTime = data.time || 0;
                iframeDuration    = data.duration || iframeDuration;
                updateProgressBarIframe();
                updateTimeDisplayIframe();
            }
        }

        });
        wrapper.addEventListener('mouseleave', () => {
            if (isDragging) return;
            if (!iframePaused) {
                clearTimeout(hideTimeout);
                wrapper.classList.remove('controls-visible');
                wrapper.classList.remove('cursor-hidden');
                if (isMobileDevice()) mobileControlsVisible = false;
            }
        });

        /* ===== شريط التقدم: حساب النسبة ===== */
        function getPctFromEvent(e, trackElement) {
            const rect = trackElement.getBoundingClientRect();
            let x = e.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            return x / rect.width;
        }
        function getPctFromTouch(touch, trackElement) {
            const rect = trackElement.getBoundingClientRect();
            let x = touch.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            return x / rect.width;
        }

        function applySeekPct(pct) {
            if (!iframeDuration) return;
            const newTime = pct * iframeDuration;
            iframeSeekTo(newTime);
            progressFill.style.width = (pct * 100) + '%';
            progressThumb.style.left = (pct * 100) + '%';
            const remaining = iframeDuration - newTime;
            timeDisplay.textContent = formatTime(remaining >= 0 ? remaining : 0);
        }

        function updateTooltip(clientX) {
            if (!iframeDuration) return;
            const rect = progressTrack.getBoundingClientRect();
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            const elapsed = (x / rect.width) * iframeDuration;
            progressTooltip.textContent = formatTime(elapsed);
            progressTooltip.style.left = x + 'px';
        }

        /* ===== شريط التقدم - ماوس ===== */
        let seekingProgress = false;
        progressTrack.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            seekingProgress = true;
            isDragging = true;
            showControls();
            clearTimeout(hideTimeout);
            progressTrack.classList.add('dragging');
            applySeekPct(getPctFromEvent(e, progressTrack));
        });
        document.addEventListener('mousemove', (e) => {
            if (seekingProgress) {
                applySeekPct(getPctFromEvent(e, progressTrack));
                updateTooltip(e.clientX);
            } else if (seekingVolume) {
                volFromClientX(e.clientX);
            }
        });
        document.addEventListener('mouseup', () => {
            if (seekingProgress) {
                seekingProgress = false;
                progressTrack.classList.remove('dragging');
                isDragging = false;
                if (!iframePaused) scheduleHide();
            }
            if (seekingVolume) {
                seekingVolume = false;
                isDragging = false;
                if (!iframePaused) scheduleHide();
            }
        });
        progressTrack.addEventListener('mousemove', (e) => { updateTooltip(e.clientX); });

        /* ===== شريط التقدم - لمس ===== */
        let touchSeekingProgress = false;
        progressTrack.addEventListener('touchstart', (e) => {
            e.stopPropagation(); e.preventDefault();
            touchSeekingProgress = true;
            isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            progressTrack.classList.add('dragging');
            const touch = e.touches[0];
            applySeekPct(getPctFromTouch(touch, progressTrack));
            updateTooltip(touch.clientX);
        }, { passive: false });
        progressTrack.addEventListener('touchmove', (e) => {
            if (!touchSeekingProgress) return;
            e.stopPropagation(); e.preventDefault();
            const touch = e.touches[0];
            applySeekPct(getPctFromTouch(touch, progressTrack));
            updateTooltip(touch.clientX);
        }, { passive: false });
        progressTrack.addEventListener('touchend', (e) => {
            if (!touchSeekingProgress) return;
            e.stopPropagation();
            touchSeekingProgress = false;
            progressTrack.classList.remove('dragging');
            isDragging = false;
            scheduleHide();
        }, { passive: true });
        progressTrack.addEventListener('touchcancel', () => {
            touchSeekingProgress = false;
            progressTrack.classList.remove('dragging');
            isDragging = false;
        }, { passive: true });

        /* ===== شريط الصوت - ماوس ===== */
        let seekingVolume = false;
        function volFromClientX(clientX) {
            const rect = volumeTrack.getBoundingClientRect();
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            iframeSetVolume(x / rect.width);
        }
        volumeTrack.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            seekingVolume = true;
            isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            volFromClientX(e.clientX);
        });

        /* ===== شريط الصوت - لمس ===== */
        let touchSeekingVolume = false;
        let volumeTouchExpandTimer = null;
        volumeIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isMobileDevice()) {
                volumeWrap.classList.add('touch-expanded');
                clearTimeout(volumeTouchExpandTimer);
                volumeTouchExpandTimer = setTimeout(() => volumeWrap.classList.remove('touch-expanded'), 3000);
            }
            if (iframeMuted || iframeVolume === 0) {
                iframeSetVolume(iframeElement._lastVol || 1);
            } else {
                iframeElement._lastVol = iframeVolume;
                iframeSetVolume(0);
            }
        });
        volumeTrack.addEventListener('touchstart', (e) => {
            e.stopPropagation(); e.preventDefault();
            touchSeekingVolume = true;
            isDragging = true;
            showControls(); clearTimeout(hideTimeout);
            volumeTrack.style.height = '6px';
            const touch = e.touches[0];
            const rect = volumeTrack.getBoundingClientRect();
            let x = touch.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            iframeSetVolume(x / rect.width);
            clearTimeout(volumeTouchExpandTimer);
        }, { passive: false });
        volumeTrack.addEventListener('touchmove', (e) => {
            if (!touchSeekingVolume) return;
            e.stopPropagation(); e.preventDefault();
            const touch = e.touches[0];
            const rect = volumeTrack.getBoundingClientRect();
            let x = touch.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            iframeSetVolume(x / rect.width);
        }, { passive: false });
        volumeTrack.addEventListener('touchend', (e) => {
            if (!touchSeekingVolume) return;
            e.stopPropagation();
            touchSeekingVolume = false;
            volumeTrack.style.height = '';
            isDragging = false;
            scheduleHide();
            volumeTouchExpandTimer = setTimeout(() => volumeWrap.classList.remove('touch-expanded'), 2000);
        }, { passive: true });
        volumeTrack.addEventListener('touchcancel', () => {
            touchSeekingVolume = false;
            volumeTrack.style.height = '';
            isDragging = false;
        }, { passive: true });

        /* ===== قائمة الإعدادات ===== */
        function getSpeedLabel(s) { return s === 1 ? 'عادي' : s + 'x'; }

        function buildSettingsMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-settings-menu';
            /* سرعة التشغيل متاحة فقط لـ YouTube */
            const speedDisabled = iframeType !== 'youtube' ? 'style="opacity:0.4;pointer-events:none"' : '';
            const speedNote     = iframeType !== 'youtube' ? ' (YouTube فقط)' : '';
            menu.innerHTML = `
                <button class="cvp-settings-menu-item cvp-speed-trigger" ${speedDisabled}>
                    ${SVG_SPEED}
                    <span>سرعة التشغيل${speedNote}</span>
                    <span class="cvp-menu-item-right">
                        <span class="cvp-current-speed-label">${getSpeedLabel(currentSpeed)}</span>
                        ${SVG_ARROW_RIGHT}
                    </span>
                </button>
            `;
            menu.querySelector('.cvp-speed-trigger').addEventListener('click', (e) => {
                e.stopPropagation();
                if (iframeType === 'youtube') swapMenu('speed');
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function buildSpeedMenu() {
            const menu = document.createElement('div');
            menu.className = 'cvp-speed-menu';
            let html = `
                <div class="cvp-speed-menu-header">
                    <button class="cvp-speed-back-btn" title="رجوع">${SVG_ARROW_LEFT}</button>
                    <span class="cvp-speed-menu-title">سرعة التشغيل</span>
                </div>
            `;
            SPEED_OPTIONS.forEach(speed => {
                const label       = speed === 1 ? 'عادي (1x)' : speed + 'x';
                const activeClass = speed === currentSpeed ? 'active' : '';
                html += `
                    <button class="cvp-speed-option ${activeClass}" data-speed="${speed}">
                        <span>${label}</span>
                        <span class="cvp-speed-check">${SVG_CHECK}</span>
                    </button>
                `;
            });
            menu.innerHTML = html;
            menu.querySelector('.cvp-speed-back-btn').addEventListener('click', (e) => { e.stopPropagation(); swapMenu('settings'); });
            menu.querySelectorAll('.cvp-speed-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const speed = parseFloat(opt.dataset.speed);
                    iframeSetSpeed(speed);
                    closeAll();
                });
            });
            menu.addEventListener('click', (e) => e.stopPropagation());
            return menu;
        }

        function createBackdrop() {
            const bd = document.createElement('div');
            bd.className = 'cvp-backdrop';
            bd.addEventListener('mousedown', (e) => { e.stopPropagation(); menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); });
            bd.addEventListener('touchstart', (e) => { e.stopPropagation(); menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); }, { passive: true });
            return bd;
        }

        function mountMenu(menuEl) {
            if (!backdropEl) { backdropEl = createBackdrop(); wrapper.insertBefore(backdropEl, settingsCorner); }
            settingsCorner.appendChild(menuEl);
            activeMenuEl = menuEl;
            settingsBtn.classList.add('open');
            wrapper.classList.add('settings-open');
        }
        function unmountCurrent(callback) {
            if (!activeMenuEl) { if (callback) callback(); return; }
            const el = activeMenuEl; activeMenuEl = null;
            el.classList.add('hiding');
            setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); if (callback) callback(); }, ANIM_DURATION);
        }
        function unmountBackdrop() {
            if (!backdropEl) return;
            const bd = backdropEl; backdropEl = null;
            bd.classList.add('hiding');
            setTimeout(() => { if (bd.parentNode) bd.parentNode.removeChild(bd); }, ANIM_DURATION);
        }
        function openSettings() {
            if (isAnimating) return;
            isAnimating = true;
            mountMenu(buildSettingsMenu());
            setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
        }
        function swapMenu(target) {
            if (isAnimating) return;
            isAnimating = true;
            unmountCurrent(() => {
                const menu = target === 'speed' ? buildSpeedMenu() : buildSettingsMenu();
                settingsCorner.appendChild(menu);
                activeMenuEl = menu;
                setTimeout(() => { isAnimating = false; }, ANIM_DURATION);
            });
        }
        function closeAll() {
            settingsBtn.classList.remove('open');
            unmountCurrent();
            unmountBackdrop();
            wrapper.classList.remove('settings-open');
        }

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeMenuEl) closeAll(); else openSettings();
        });
        document.addEventListener('mousedown', (e) => {
            if (activeMenuEl && !wrapper.contains(e.target)) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); }
        });

        /* ===== seek بالمقدار ===== */
        let seekAccumLeft = 0, seekAccumRight = 0;
        let seekResetTimerLeft = null, seekResetTimerRight = null;
        const SEEK_RESET_DELAY = 1000;

        function showFlash(side, seconds) {
            const el = side === 'left' ? flashLeft : flashRight;
            const label = side === 'left' ? '-' : '+';
            el.querySelector('span').textContent = label + seconds + 's';
            el.classList.add('show');
            if (side === 'left') {
                clearTimeout(flashLeft._hideTimer);
                flashLeft._hideTimer = setTimeout(() => el.classList.remove('show'), 800);
            } else {
                clearTimeout(flashRight._hideTimer);
                flashRight._hideTimer = setTimeout(() => el.classList.remove('show'), 800);
            }
        }

        function seekBy(seconds) {
            const side = seconds < 0 ? 'left' : 'right';
            if (side === 'left') {
                clearTimeout(seekResetTimerLeft);
                seekAccumLeft += Math.abs(seconds);
                iframeSeekTo(iframeCurrentTime - Math.abs(seconds));
                showFlash('left', seekAccumLeft);
                seekResetTimerLeft = setTimeout(() => { seekAccumLeft = 0; }, SEEK_RESET_DELAY);
            } else {
                clearTimeout(seekResetTimerRight);
                seekAccumRight += Math.abs(seconds);
                iframeSeekTo(iframeCurrentTime + Math.abs(seconds));
                showFlash('right', seekAccumRight);
                seekResetTimerRight = setTimeout(() => { seekAccumRight = 0; }, SEEK_RESET_DELAY);
            }
            updateProgressBarIframe();
        }

        /* ===== أحداث الأزرار ===== */
        playBtn.addEventListener('click', (e)      => { e.stopPropagation(); iframeTogglePlay(); });
        restartBtn.addEventListener('click', (e)   => { e.stopPropagation(); iframeRestart(); });
        fullscreenBtn.addEventListener('click', (e)=> { e.stopPropagation(); toggleFullscreen(); });
        toggleScanBtn.addEventListener('click', (e)=> {
            e.stopPropagation();
            if (scanlineDiv.style.display === 'block') { scanlineDiv.style.display = 'none'; toggleScanBtn.classList.remove('active'); }
            else { scanlineDiv.style.display = 'block'; toggleScanBtn.classList.add('active'); }
        });
        saveBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isSaving) stopIframeSaving(); else startIframeSaving();
        });

        /* scanline يستجيب للنقر */
        scanlineDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); return; }
            if (menuJustClosed) return;
            iframeTogglePlay();
        });

        /* fullscreen */
        function updateFullscreenButton() {
            fullscreenBtn.innerHTML = document.fullscreenElement ? SVG_FULLSCREEN_EXIT : SVG_FULLSCREEN_ENTER;
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(err => console.log(err.message));
            } else {
                document.exitFullscreen();
            }
        }
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement === wrapper) { document.body.classList.add('dideofullscreen'); }
            else if (!document.fullscreenElement) { document.body.classList.remove('dideofullscreen'); }
            updateFullscreenButton();
        });

        /* لوحة المفاتيح */
        wrapper.setAttribute('tabindex', '0');
        wrapper.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ': case 'k': e.preventDefault(); if (activeMenuEl) { closeAll(); break; } iframeTogglePlay(); break;
                case 'ArrowRight': e.preventDefault(); seekBy(5);  break;
                case 'ArrowLeft':  e.preventDefault(); seekBy(-5); break;
                case 'ArrowUp':    e.preventDefault(); iframeSetVolume(iframeVolume + 0.1); break;
                case 'ArrowDown':  e.preventDefault(); iframeSetVolume(iframeVolume - 0.1); break;
                case 'f':  e.preventDefault(); toggleFullscreen(); break;
                case 'm':  e.preventDefault();
                    if (iframeMuted || iframeVolume === 0) iframeSetVolume(iframeElement._lastVol || 1);
                    else { iframeElement._lastVol = iframeVolume; iframeSetVolume(0); }
                    break;
                case 'Escape': if (activeMenuEl) { e.preventDefault(); closeAll(); } break;
            }
        });

        /* منطق اللمس */
        const SCROLL_THRESHOLD = 10;
        const TAP_MOVE_LIMIT   = 8;
        const TAP_DELAY        = 300;
        let touchStartX = 0, touchStartY = 0;
        let touchMoved = false, touchIsScrolling = false;
        let tapCount = 0, tapTimer = null, tapSide = null;

        wrapper.addEventListener('touchstart', (e) => {
            const target = e.target;
            if (target.closest('.custom-controls') || target.closest('.cvp-settings-corner') || target.closest('.seek-flash')) return;
            const touch = e.touches[0];
            touchStartX = touch.clientX; touchStartY = touch.clientY;
            touchMoved = false; touchIsScrolling = false;
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            const target = e.target;
            if (target.closest('.custom-controls') || target.closest('.cvp-settings-corner')) return;
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            if (!touchMoved && (Math.abs(dx) > TAP_MOVE_LIMIT || Math.abs(dy) > TAP_MOVE_LIMIT)) touchMoved = true;
            if (!touchIsScrolling && Math.abs(dy) > SCROLL_THRESHOLD && Math.abs(dy) > Math.abs(dx)) touchIsScrolling = true;
            if (!touchIsScrolling) e.preventDefault();
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            const target = e.target;
            if (target.closest('.custom-controls') || target.closest('.cvp-settings-corner') || target.closest('.seek-flash')) return;
            if (touchIsScrolling || touchMoved) { touchIsScrolling = false; touchMoved = false; return; }
            e.preventDefault();
            if (activeMenuEl) { menuJustClosed = true; closeAll(); setTimeout(() => { menuJustClosed = false; }, 300); touchMoved = false; touchIsScrolling = false; return; }
            if (menuJustClosed) { touchMoved = false; touchIsScrolling = false; return; }
            if (!mobileControlsVisible) { showControls(); scheduleHide(); touchMoved = false; touchIsScrolling = false; return; }

            const touch  = e.changedTouches[0];
            const rect   = wrapper.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const side   = touchX < rect.width / 2 ? 'left' : 'right';

            if (tapCount === 1 && tapSide === side) {
                clearTimeout(tapTimer);
                tapCount = 0; tapSide = null;
                if (side === 'right') seekBy(5); else seekBy(-5);
                showControls();
                if (!iframePaused) scheduleHide();
            } else {
                tapCount = 1; tapSide = side;
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    if (tapCount === 1) { iframeTogglePlay(); showControls(); }
                    tapCount = 0; tapSide = null;
                }, TAP_DELAY);
            }
            touchMoved = false; touchIsScrolling = false;
        }, { passive: false });

        wrapper.addEventListener('touchcancel', () => { touchMoved = false; touchIsScrolling = false; }, { passive: true });

        /* تهيئة الـ API المناسبة */
        wrapper.classList.remove('loading');
        if (iframeType === 'youtube') {
            wrapper.classList.add('loading');
            initYouTubeAPI();
        } else if (iframeType === 'vimeo') {
            initVimeoAPI();
        } else {
            initGenericAPI();
        }

        showControls();
        updatePlayButton();
        updateVolumeUI(1);

        allPlayers.push({
            videoElement: { paused: true },
            wrapper,
            saveCurrentPosition: saveIframePosition,
            saveCurrentVolume: saveIframeVolume
        });

        return wrapper;
    };

    /* =========================================================
       تطبيق المشغل على كل video وiframe تلقائياً
    ========================================================= */
    window.applyToAllVideos = function() {
        /* video elements */
        document.querySelectorAll('video:not([data-customized])').forEach(video => {
            customVideoPlayer(video);
            video.setAttribute('data-customized', 'true');
        });

        /* iframe elements */
        document.querySelectorAll('iframe:not([data-customized])').forEach(iframe => {
            const src = iframe.src || iframe.getAttribute('src') || '';
            if (!src) return;
            const type = detectIframeType(src);
            /* نطبق على iframes المعروفة أو أي iframe فيه src */
            customIframePlayer(iframe);
            iframe.setAttribute('data-customized', 'true');
        });
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyToAllVideos);
    } else {
        applyToAllVideos();
    }

    const observer = new MutationObserver(mutations => {
        mutations.forEach(m => { if (m.addedNodes.length) applyToAllVideos(); });
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
    </script>
</body>
